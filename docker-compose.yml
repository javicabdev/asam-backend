services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.dev.proxy-fix
      args:
        - HTTP_PROXY=
        - HTTPS_PROXY=
        - NO_PROXY=localhost,127.0.0.1
    container_name: asam-backend-api
    ports:
      - "${PORT:-8080}:8080"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - asam-network
    env_file:
      - .env
    environment:
      - DB_HOST=postgres
      - GO111MODULE=on
      - GOPROXY=direct
      - GOSUMDB=off
      - GOINSECURE=*
      - GIT_SSL_NO_VERIFY=true
    volumes:
      - .:/app
      - /app/tmp
      - go-mod-cache:/go/pkg/mod
    restart: unless-stopped
    stdin_open: true
    tty: true

  postgres:
    image: postgres:14-alpine
    container_name: asam-postgres
    restart: unless-stopped
    environment:
      - POSTGRES_USER=${DB_USER:-postgres}
      - POSTGRES_PASSWORD=${DB_PASSWORD:-postgres}
      - POSTGRES_DB=${POSTGRES_DB:-asam_db}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "${DB_PORT:-5432}:5432"
    networks:
      - asam-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${POSTGRES_DB:-asam_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

networks:
  asam-network:
    driver: bridge

volumes:
  postgres-data:
    driver: local
  go-mod-cache:
    driver: local
