# .air.toml configuration for hot reload in development
# Optimized for ASAM Backend with GraphQL

root = "."
tmp_dir = "tmp"
testdata_dir = "testdata"

[build]
# Build command - includes GraphQL generation check
# First generate GraphQL if schema changed, then build
pre_cmd = ["go run ./cmd/generate"]
cmd = "go build -tags 'postgres' -o tmp/asam-backend ./cmd/api"
bin = "tmp/asam-backend"
# Additional arguments for the binary
args_bin = []
# Full binary path (optional)
full_bin = ""
# Watch these file extensions
include_ext = ["go", "tpl", "tmpl", "html", "yml", "yaml", "json", "graphql", "gql"]
# Include specific files to watch
include_file = []
# Exclude these directories from watching
exclude_dir = ["assets", "tmp", "vendor", "scripts", ".git", "node_modules", "logs", ".github", "docs", "test-graphql"]
# Exclude files matching regex
exclude_regex = ["_test\\.go", ".*\\.md"]
# Exclude unchanged files
exclude_unchanged = true
# Follow symlinks
follow_symlink = false
# Kill delay before rebuilding
kill_delay = "0.5s"
# Log build errors to file
log = "./logs/build-errors.log"
# Poll mode (for Docker volumes on Windows/Mac)
poll = false
poll_interval = 0
# Post build commands
post_cmd = []
# Delay before building (milliseconds)
delay = 1000
# Stop on build error
stop_on_error = false
# Send interrupt signal instead of kill
send_interrupt = false
# Rerun binary when it exits
rerun = false
rerun_delay = 500

[log]
# Show timestamp in logs
time = true
# Only show main process logs
main_only = false

[color]
# Colorize air output
main = "magenta"
watcher = "cyan"
build = "yellow"
runner = "green"
app = ""

[misc]
# Clean tmp directory on exit
clean_on_exit = true

[screen]
# Clear console on rebuild
clear_on_rebuild = false
# Keep scroll position
keep_scroll = true
