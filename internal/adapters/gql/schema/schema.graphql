# Scalares personalizados
scalar Time
scalar JWT

# Enums
enum MembershipType {
    INDIVIDUAL
    FAMILY
}

enum MemberStatus {
    ACTIVE
    INACTIVE
}

enum OperationType {
    MEMBERSHIP_FEE
    CURRENT_EXPENSE
    FUND_DELIVERY
    OTHER_INCOME
}

enum PaymentStatus {
    PENDING
    PAID
    CANCELLED
}

enum SortDirection {
    ASC
    DESC
}

enum MemberSortField {
    NUMERO_SOCIO
    NOMBRE
    APELLIDOS
    FECHA_ALTA
    ESTADO
}

enum FamilySortField {
    NUMERO_SOCIO
    ESPOSO_NOMBRE
    ESPOSA_NOMBRE
}

enum TransactionSortField {
    DATE
    AMOUNT
    OPERATION_TYPE
}

enum UserRole {
    admin
    user
}

# Tipos de autenticación
type User {
    id: ID!
    username: String!
    email: String!
    role: UserRole!
    member: Member  # Asociación con socio (null para admin, requerido para user)
    isActive: Boolean!
    lastLogin: Time
    emailVerified: Boolean!
    emailVerifiedAt: Time
}

type AuthResponse {
    user: User!
    accessToken: JWT!
    refreshToken: JWT!
    expiresAt: Time!
}

type TokenResponse {
    accessToken: JWT!
    refreshToken: JWT!
    expiresAt: Time!
}

# Tipos base
type Member {
    miembro_id: ID!
    numero_socio: String!
    tipo_membresia: MembershipType!
    nombre: String!
    apellidos: String!
    calle_numero_piso: String!
    codigo_postal: String!
    poblacion: String!
    provincia: String!
    pais: String!
    estado: MemberStatus!
    fecha_alta: Time!
    fecha_baja: Time
    fecha_nacimiento: Time
    documento_identidad: String
    correo_electronico: String
    profesion: String
    nacionalidad: String
    observaciones: String
}

type Family {
    id: ID!
    numero_socio: String!
    miembro_origen: Member
    esposo_nombre: String!
    esposo_apellidos: String!
    esposa_nombre: String!
    esposa_apellidos: String!
    familiares: [Familiar!]
}

type Familiar {
    id: ID!
    nombre: String!
    apellidos: String!
    fecha_nacimiento: Time
    dni_nie: String
    correo_electronico: String
}

type Payment {
    id: ID!
    member: Member
    family: Family
    amount: Float!
    payment_date: Time!
    status: PaymentStatus!
    payment_method: String!
    notes: String
    membership_fee: MembershipFee
}

type MembershipFee {
    id: ID!
    year: Int!
    base_fee_amount: Float!
    family_fee_extra: Float!
    status: PaymentStatus!
    due_date: Time!
    payment: Payment
}

type CashFlow {
    id: ID!
    amount: Float!
    date: Time!
    operation_type: OperationType!
    detail: String!
    member: Member
    family: Family
    payment: Payment
}

# Inputs para filtros
input PaginationInput {
    page: Int! = 1
    pageSize: Int! = 10
}

input SortInput {
    field: String!
    direction: SortDirection!
}

input MemberFilter {
    estado: MemberStatus
    tipo_membresia: MembershipType
    search_term: String
    pagination: PaginationInput
    sort: SortInput
}

input FamilyFilter {
    search_term: String
    pagination: PaginationInput
    sort: SortInput
}

input TransactionFilter {
    start_date: Time
    end_date: Time
    operation_type: OperationType
    pagination: PaginationInput
    sort: SortInput
}

# Tipos para paginación
type PageInfo {
    hasNextPage: Boolean!
    hasPreviousPage: Boolean!
    totalCount: Int!
}

type MemberConnection {
    nodes: [Member!]!
    pageInfo: PageInfo!
}

type FamilyConnection {
    nodes: [Family!]!
    pageInfo: PageInfo!
}

type TransactionConnection {
    nodes: [CashFlow!]!
    pageInfo: PageInfo!
}

# Query principal
type Query {
    # Health check - no authentication required
    health: String!
    ping: String!
    
    # User Queries (Admin only)
    getUser(id: ID!): User
    listUsers(page: Int = 1, pageSize: Int = 10): [User!]!
    getCurrentUser: User!
    
    # Member Queries
    getMember(id: ID!): Member
    listMembers(filter: MemberFilter): MemberConnection!
    searchMembers(criteria: String!): [Member!]!
    searchMembersWithoutUser(criteria: String!): [Member!]!

    # Family Queries
    getFamily(id: ID!): Family
    listFamilies(filter: FamilyFilter): FamilyConnection!
    getFamilyMembers(familyId: ID!): [Familiar!]!

    # Payment Queries
    getPayment(id: ID!): Payment
    getMemberPayments(memberId: ID!): [Payment!]!
    getFamilyPayments(familyId: ID!): [Payment!]!
    getPaymentStatus(id: ID!): PaymentStatus!
    
    # MembershipFee Queries
    getMembershipFee(year: Int!): MembershipFee
    listMembershipFees(page: Int = 1, pageSize: Int = 10): [MembershipFee!]!
    getPendingFees: [MembershipFee!]!

    # CashFlow Queries
    getCashFlow(id: ID!): CashFlow
    getBalance: Float!
    getTransactions(filter: TransactionFilter): TransactionConnection!
    
    # Member Number Queries
    getNextMemberNumber(isFamily: Boolean!): String!
    checkMemberNumberExists(memberNumber: String!): Boolean!
    
    # Document Validation Query
    checkDocumentValidity(documentNumber: String!): DocumentValidationResult!
    
    # Dashboard Queries
    getDashboardStats: DashboardStats!
    getRecentActivity(limit: Int = 10): [RecentActivity!]!
}

# Type for document validation result
type DocumentValidationResult {
    isValid: Boolean!
    normalizedValue: String
    errorMessage: String
}

# Dashboard Types
type DashboardStats {
    # Member stats
    totalMembers: Int!
    activeMembers: Int!
    inactiveMembers: Int!
    individualMembers: Int!
    familyMembers: Int!
    newMembersThisMonth: Int!
    newMembersLastMonth: Int!
    memberGrowthPercentage: Float!
    
    # Payment stats
    totalRevenue: Float!
    monthlyRevenue: Float!
    pendingPayments: Float!
    averagePayment: Float!
    paymentCompletionRate: Float!
    revenueGrowthPercentage: Float!
    
    # Financial stats
    currentBalance: Float!
    monthlyExpenses: Float!
    
    # Activity stats
    totalTransactions: Int!
    recentPaymentsCount: Int!
    
    # Time-based data for charts
    membershipTrend: [MembershipTrendData!]!
    revenueTrend: [RevenueTrendData!]!
}

type MembershipTrendData {
    month: String!
    newMembers: Int!
    totalMembers: Int!
}

type RevenueTrendData {
    month: String!
    revenue: Float!
    expenses: Float!
}

enum ActivityType {
    MEMBER_REGISTERED
    PAYMENT_RECEIVED
    FAMILY_CREATED
    MEMBER_DEACTIVATED
    TRANSACTION_RECORDED
}

type RecentActivity {
    id: ID!
    type: ActivityType!
    description: String!
    timestamp: Time!
    relatedMember: Member
    relatedFamily: Family
    amount: Float
}

# Input Types para mutations
input CreateMemberInput {
    numero_socio: String!
    tipo_membresia: MembershipType!
    nombre: String!
    apellidos: String!
    calle_numero_piso: String!
    codigo_postal: String!
    poblacion: String!
    provincia: String
    pais: String
    fecha_nacimiento: Time
    documento_identidad: String
    correo_electronico: String
    profesion: String
    nacionalidad: String
    observaciones: String
}

input UpdateMemberInput {
    miembro_id: ID!
    calle_numero_piso: String
    codigo_postal: String
    poblacion: String
    provincia: String
    pais: String
    documento_identidad: String
    correo_electronico: String
    profesion: String
    observaciones: String
}

input CreateFamilyInput {
    numero_socio: String!
    miembro_origen_id: ID
    esposo_nombre: String!
    esposo_apellidos: String!
    esposa_nombre: String!
    esposa_apellidos: String!
    esposo_fecha_nacimiento: Time
    esposo_documento_identidad: String
    esposo_correo_electronico: String
    esposa_fecha_nacimiento: Time
    esposa_documento_identidad: String
    esposa_correo_electronico: String
}

input UpdateFamilyInput {
    familia_id: ID!
    esposo_nombre: String
    esposo_apellidos: String
    esposa_nombre: String
    esposa_apellidos: String
    esposo_documento_identidad: String
    esposo_correo_electronico: String
    esposa_documento_identidad: String
    esposa_correo_electronico: String
}

input FamiliarInput {
    nombre: String!
    apellidos: String!
    fecha_nacimiento: Time
    dni_nie: String
    correo_electronico: String
    parentesco: String!
}

input PaymentInput {
    member_id: ID
    family_id: ID
    amount: Float!
    payment_method: String!
    notes: String
}

input TransactionInput {
    member_id: ID
    family_id: ID
    operation_type: OperationType!
    amount: Float!
    date: Time!
    detail: String!
}

# Input Types para Auth
input LoginInput {
    username: String!
    password: String!
}

input RefreshTokenInput {
    refreshToken: JWT!
}

# Input Types para User Management
input CreateUserInput {
    username: String!
    email: String!
    password: String!
    role: UserRole!
    memberId: ID  # Requerido si role es USER, prohibido si role es ADMIN
}

input UpdateUserInput {
    id: ID!
    username: String
    email: String
    password: String
    role: UserRole
    isActive: Boolean
    memberId: ID  # Solo puede cambiar si también cambia el rol
}

input ChangePasswordInput {
    currentPassword: String!
    newPassword: String!
}

# Mutation Types
type MutationResponse {
    success: Boolean!
    message: String
    error: String
}

type Mutation {
    # Member Mutations
    createMember(input: CreateMemberInput!): Member!
    updateMember(input: UpdateMemberInput!): Member!
    deleteMember(id: ID!): MutationResponse!
    changeMemberStatus(id: ID!, status: MemberStatus!): Member!

    # Family Mutations
    createFamily(input: CreateFamilyInput!): Family!
    updateFamily(input: UpdateFamilyInput!): Family!
    addFamilyMember(family_id: ID!, familiar: FamiliarInput!): Family!
    removeFamilyMember(familiar_id: ID!): MutationResponse!

    # Payment Mutations
    registerPayment(input: PaymentInput!): Payment!
    updatePayment(id: ID!, input: PaymentInput!): Payment!
    cancelPayment(id: ID!, reason: String!): MutationResponse!
    registerFee(year: Int!, base_amount: Float!): MutationResponse!

    # CashFlow Mutations
    registerTransaction(input: TransactionInput!): CashFlow!
    updateTransaction(id: ID!, input: TransactionInput!): CashFlow!
    adjustBalance(amount: Float!, reason: String!): MutationResponse!

    # Auth Mutations
    login(input: LoginInput!): AuthResponse!
    logout: MutationResponse!
    refreshToken(input: RefreshTokenInput!): TokenResponse!

    # User Management Mutations (Admin only)
    createUser(input: CreateUserInput!): User!
    updateUser(input: UpdateUserInput!): User!
    deleteUser(id: ID!): MutationResponse!
    changePassword(input: ChangePasswordInput!): MutationResponse!
    resetUserPassword(userId: ID!, newPassword: String!): MutationResponse! # Admin only
    
    # Email Verification Mutations
    sendVerificationEmail: MutationResponse!
    verifyEmail(token: String!): MutationResponse!
    resendVerificationEmail(email: String!): MutationResponse!
    
    # Password Recovery Mutations
    requestPasswordReset(email: String!): MutationResponse!
    resetPasswordWithToken(token: String!, newPassword: String!): MutationResponse!
}
