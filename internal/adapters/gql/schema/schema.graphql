    isActive: Boolean
    memberId: ID  # Solo puede cambiar si también cambia el rol
}

input ChangePasswordInput {
    currentPassword: String!
    newPassword: String!
}

# Mutation Types
type MutationResponse {
    success: Boolean!
    message: String
    error: String
}

type Mutation {
    # Member Mutations
    createMember(input: CreateMemberInput!): Member!
    updateMember(input: UpdateMemberInput!): Member!
    deleteMember(id: ID!): MutationResponse!
    changeMemberStatus(id: ID!, status: MemberStatus!): Member!

    # Family Mutations
    createFamily(input: CreateFamilyInput!): Family!
    updateFamily(input: UpdateFamilyInput!): Family!
    addFamilyMember(family_id: ID!, familiar: FamiliarInput!): Family!
    removeFamilyMember(familiar_id: ID!): MutationResponse!

    # Payment Mutations
    registerPayment(input: PaymentInput!): Payment!
    updatePayment(id: ID!, input: PaymentInput!): Payment!
    cancelPayment(id: ID!, reason: String!): MutationResponse!
    confirmPayment(id: ID!, paymentMethod: String!, paymentDate: Time, notes: String, amount: Float): Payment!
    generateAnnualFees(input: GenerateAnnualFeesInput!): GenerateAnnualFeesResponse!

    # CashFlow Mutations
    createCashFlow(input: CreateCashFlowInput!): CashFlow!
    updateCashFlow(id: ID!, input: UpdateCashFlowInput!): CashFlow!
    deleteCashFlow(id: ID!): MutationResponse!
    adjustBalance(amount: Float!, reason: String!): MutationResponse!

    # DEPRECATED: usar createCashFlow y updateCashFlow
    registerTransaction(input: TransactionInput!): CashFlow!
    updateTransaction(id: ID!, input: TransactionInput!): CashFlow!

    # Auth Mutations
    login(input: LoginInput!): AuthResponse!
    logout: MutationResponse!
    refreshToken(input: RefreshTokenInput!): TokenResponse!

    # User Management Mutations (Admin only)
    createUser(input: CreateUserInput!): User!
    updateUser(input: UpdateUserInput!): User!
    deleteUser(id: ID!): MutationResponse!
    changePassword(input: ChangePasswordInput!): MutationResponse!
    resetUserPassword(userId: ID!, newPassword: String!): MutationResponse! # Admin only
    
    # Email Verification Mutations
    sendVerificationEmail: MutationResponse!
    verifyEmail(token: String!): MutationResponse!
    resendVerificationEmail(email: String!): MutationResponse!
    
    # Password Recovery Mutations
    requestPasswordReset(email: String!): MutationResponse!
    resetPasswordWithToken(token: String!, newPassword: String!): MutationResponse!
}

# Delinquent Report Types

"""
Parámetros de entrada para el informe de morosos
"""
input DelinquentReportInput {
    """
    Fecha de corte para calcular la antigüedad de la deuda.
    Si no se proporciona, se usa la fecha actual.
    """
    cutoffDate: Time

    """
    Importe mínimo de deuda para incluir en el informe.
    Útil para filtrar deudas pequeñas.
    Default: 0
    """
    minAmount: Float

    """
    Filtrar solo por socios individuales o familias
    Valores: "INDIVIDUAL" | "FAMILY" | null (ambos)
    """
    debtorType: String

    """
    Ordenamiento de resultados
    Valores: "AMOUNT_DESC" | "AMOUNT_ASC" | "DAYS_DESC" | "DAYS_ASC" | "NAME_ASC"
    Default: "DAYS_DESC" (más antiguas primero)
    """
    sortBy: String

    """
    Paginación
    """
    pagination: PaginationInput
}

"""
Respuesta del informe de morosos con paginación
"""
type DelinquentReportResponse {
    """
    Lista de deudores (socios o familias) paginados
    """
    debtors: [Debtor!]!

    """
    Información de paginación
    """
    pageInfo: PageInfo!

    """
    Estadísticas generales del informe (basadas en TODOS los deudores, no solo la página actual)
    """
    summary: DelinquentSummary!

    """
    Fecha en que se generó el informe
    """
    generatedAt: Time!
}

"""
Representa un deudor (socio o familia)
"""
type Debtor {
    """
    ID del socio (si es deuda individual)
    """
    memberId: ID

    """
    ID de la familia (si es deuda familiar)
    """
    familyId: ID

    """
    Tipo de deudor: "INDIVIDUAL" o "FAMILY"
    """
    type: String!

    """
    Información del socio (si es individual)
    """
    member: DebtorMemberInfo

    """
    Información de la familia (si es familiar)
    """
    family: DebtorFamilyInfo

    """
    Lista de pagos pendientes
    """
    pendingPayments: [PendingPayment!]!

    """
    Importe total pendiente (suma de todos los pagos pendientes)
    """
    totalDebt: Float!

    """
    Días de atraso del pago más antiguo
    """
    oldestDebtDays: Int!

    """
    Fecha del pago pendiente más antiguo
    """
    oldestDebtDate: Time!

    """
    Última fecha en que este socio/familia realizó un pago exitoso
    """
    lastPaymentDate: Time

    """
    Importe del último pago realizado
    """
    lastPaymentAmount: Float
}

"""
Información básica del socio para el informe
"""
type DebtorMemberInfo {
    id: ID!
    memberNumber: String!
    firstName: String!
    lastName: String!
    email: String
    phone: String
    status: String!
}

"""
Información básica de la familia para el informe
"""
type DebtorFamilyInfo {
    id: ID!
    familyName: String!
    primaryMember: DebtorMemberInfo!
    totalMembers: Int!
}

"""
Información de un pago pendiente
"""
type PendingPayment {
    id: ID!
    amount: Float!
    createdAt: Time!
    daysOverdue: Int!
    notes: String
}

"""
Resumen estadístico del informe
"""
type DelinquentSummary {
    """
    Número total de deudores
    """
    totalDebtors: Int!

    """
    Número de socios individuales con deuda
    """
    individualDebtors: Int!

    """
    Número de familias con deuda
    """
    familyDebtors: Int!

    """
    Importe total de todas las deudas
    """
    totalDebtAmount: Float!

    """
    Promedio de días de atraso
    """
    averageDaysOverdue: Int!

    """
    Deuda promedio por deudor
    """
    averageDebtPerDebtor: Float!
}
