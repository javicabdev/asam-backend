# Scalares personalizados
scalar Time
scalar JWT

# Enums
enum MembershipType {
    INDIVIDUAL
    FAMILY
}

enum MemberStatus {
    ACTIVE
    INACTIVE
}

enum OperationType {
    # INGRESOS (amount > 0)
    INGRESO_CUOTA          # Generado automáticamente por pagos
    INGRESO_DONACION       # Registro manual
    INGRESO_OTRO           # Registro manual

    # GASTOS (amount < 0)
    GASTO_REPATRIACION     # Requiere member_id
    GASTO_ADMINISTRATIVO   # Tasas, sellos, copistería
    GASTO_BANCARIO         # Comisiones bancarias
    GASTO_AYUDA            # Ayudas sociales
    GASTO_OTRO             # Otros gastos
}

enum PaymentStatus {
    PENDING
    PAID
    CANCELLED
}

enum SortDirection {
    ASC
    DESC
}

enum MemberSortField {
    NUMERO_SOCIO
    NOMBRE
    APELLIDOS
    FECHA_ALTA
    ESTADO
}

enum FamilySortField {
    NUMERO_SOCIO
    ESPOSO_NOMBRE
    ESPOSA_NOMBRE
}

enum TransactionSortField {
    DATE
    AMOUNT
    OPERATION_TYPE
}

enum UserRole {
    admin
    user
}

# Tipos de autenticación
type User {
    id: ID!
    username: String!
    email: String!
    role: UserRole!
    member: Member  # Asociación con socio (null para admin, requerido para user)
    isActive: Boolean!
    lastLogin: Time
    emailVerified: Boolean!
    emailVerifiedAt: Time
}

type AuthResponse {
    user: User!
    accessToken: JWT!
    refreshToken: JWT!
    expiresAt: Time!
}

type TokenResponse {
    accessToken: JWT!
    refreshToken: JWT!
    expiresAt: Time!
}

# Tipos base
type Telephone {
    id: ID!
    numero_telefono: String!
}

type Member {
    miembro_id: ID!
    numero_socio: String!
    tipo_membresia: MembershipType!
    nombre: String!
    apellidos: String!
    calle_numero_piso: String!
    codigo_postal: String!
    poblacion: String!
    provincia: String!
    pais: String!
    estado: MemberStatus!
    fecha_alta: Time!
    fecha_baja: Time
    fecha_nacimiento: Time
    documento_identidad: String
    correo_electronico: String
    profesion: String
    nacionalidad: String
    observaciones: String
    telefonos: [Telephone!]
}

type Family {
    id: ID!
    numero_socio: String!
    miembro_origen: Member
    esposo_nombre: String!
    esposo_apellidos: String!
    esposo_fecha_nacimiento: Time
    esposo_documento_identidad: String
    esposo_correo_electronico: String
    esposa_nombre: String!
    esposa_apellidos: String!
    esposa_fecha_nacimiento: Time
    esposa_documento_identidad: String
    esposa_correo_electronico: String
    familiares: [Familiar!]
    telefonos: [Telephone!]
}

type Familiar {
    id: ID!
    nombre: String!
    apellidos: String!
    fecha_nacimiento: Time
    dni_nie: String
    correo_electronico: String
    parentesco: String!
    telefonos: [Telephone!]
}

type Payment {
    id: ID!
    member: Member!
    amount: Float!
    payment_date: Time
    status: PaymentStatus!
    payment_method: String!
    notes: String
    membership_fee: MembershipFee
}

type MembershipFee {
    id: ID!
    year: Int!
    base_fee_amount: Float!
    family_fee_extra: Float!
    due_date: Time!
}

type PaymentGenerationDetail {
    member_id: ID!
    member_number: String!
    member_name: String!
    amount: Float!
    was_created: Boolean!
    error: String
}

type GenerateAnnualFeesResponse {
    year: Int!
    membership_fee_id: ID!
    payments_generated: Int!
    payments_existing: Int!
    total_members: Int!
    total_expected_amount: Float!
    details: [PaymentGenerationDetail!]!
}

type CashFlow {
    id: ID!
    amount: Float!
    date: Time!
    operation_type: OperationType!
    detail: String!
    running_balance: Float!  # Saldo acumulado después de este movimiento
    member: Member
    payment: Payment
    created_at: Time!
    updated_at: Time!
}

type CashFlowBalance {
    totalIncome: Float!
    totalExpenses: Float!
    currentBalance: Float!
}

type CategoryAmount {
    category: OperationType!
    amount: Float!
    count: Int!
}

type MonthlyAmount {
    month: String!       # Formato: "2025-10"
    income: Float!
    expenses: Float!
    balance: Float!
}

type CashFlowStats {
    incomeByCategory: [CategoryAmount!]!
    expensesByCategory: [CategoryAmount!]!
    monthlyTrend: [MonthlyAmount!]!
}

# Inputs para filtros
input PaginationInput {
    page: Int! = 1
    pageSize: Int! = 10
}

input SortInput {
    field: String!
    direction: SortDirection!
}

input MemberFilter {
    estado: MemberStatus
    tipo_membresia: MembershipType
    search_term: String
    pagination: PaginationInput
    sort: SortInput
}

input FamilyFilter {
    search_term: String
    pagination: PaginationInput
    sort: SortInput
}

input TransactionFilter {
    start_date: Time
    end_date: Time
    operation_type: OperationType
    member_id: ID
    category: String  # "INGRESO" o "GASTO"
    pagination: PaginationInput
    sort: SortInput
}

input PaymentFilter {
    status: PaymentStatus
    payment_method: String
    start_date: Time
    end_date: Time
    min_amount: Float
    max_amount: Float
    member_id: ID
    pagination: PaginationInput
    sort: SortInput
}

# Tipos para paginación
type PageInfo {
    hasNextPage: Boolean!
    hasPreviousPage: Boolean!
    totalCount: Int!
}

type MemberConnection {
    nodes: [Member!]!
    pageInfo: PageInfo!
}

type FamilyConnection {
    nodes: [Family!]!
    pageInfo: PageInfo!
}

type TransactionConnection {
    nodes: [CashFlow!]!
    pageInfo: PageInfo!
}

type PaymentConnection {
    nodes: [Payment!]!
    pageInfo: PageInfo!
}

type UserConnection {
    nodes: [User!]!
    pageInfo: PageInfo!
}

# Query principal
type Query {
    # Health check - no authentication required
    health: String!
    ping: String!
    
    # User Queries (Admin only)
    getUser(id: ID!): User
    listUsers(page: Int = 1, pageSize: Int = 10): UserConnection!
    getCurrentUser: User!
    
    # Member Queries
    getMember(id: ID!): Member
    listMembers(filter: MemberFilter): MemberConnection!
    searchMembers(criteria: String!): [Member!]!
    searchMembersWithoutUser(criteria: String!): [Member!]!

    # Family Queries
    getFamily(id: ID!): Family
    getFamilyByOriginMember(memberId: ID!): Family
    listFamilies(filter: FamilyFilter): FamilyConnection!
    getFamilyMembers(familyId: ID!): [Familiar!]!

    # Payment Queries
    getPayment(id: ID!): Payment
    getMemberPayments(memberId: ID!): [Payment!]!
    getFamilyPayments(familyId: ID!): [Payment!]!
    getPaymentStatus(id: ID!): PaymentStatus!
    listPayments(filter: PaymentFilter): PaymentConnection!
    
    # MembershipFee Queries
    getMembershipFee(year: Int!): MembershipFee
    listMembershipFees(page: Int = 1, pageSize: Int = 10): [MembershipFee!]!
    listAnnualFees: [MembershipFee!]!  # Alias simplificado sin paginación
    getPendingFees: [MembershipFee!]!

    # CashFlow Queries
    getCashFlow(id: ID!): CashFlow
    cashFlowBalance: CashFlowBalance!
    cashFlowStats(start_date: Time!, end_date: Time!): CashFlowStats!
    getTransactions(filter: TransactionFilter): TransactionConnection!
    getBalance: Float!  # DEPRECATED: usar cashFlowBalance en su lugar
    
    # Member Number Queries
    getNextMemberNumber(isFamily: Boolean!): String!
    checkMemberNumberExists(memberNumber: String!): Boolean!
    
    # Document Validation Query
    checkDocumentValidity(documentNumber: String!): DocumentValidationResult!
    
    # Dashboard Queries
    getDashboardStats: DashboardStats!
    getRecentActivity(limit: Int = 10): [RecentActivity!]!

    # Report Queries
    getDelinquentReport(input: DelinquentReportInput): DelinquentReportResponse!
}

# Type for document validation result
type DocumentValidationResult {
    isValid: Boolean!
    normalizedValue: String
    errorMessage: String
}

# Dashboard Types
type DashboardStats {
    # Member stats
    totalMembers: Int!
    activeMembers: Int!
    inactiveMembers: Int!
    individualMembers: Int!
    familyMembers: Int!
    newMembersThisMonth: Int!
    newMembersLastMonth: Int!
    memberGrowthPercentage: Float!
    
    # Payment stats
    totalRevenue: Float!
    monthlyRevenue: Float!
    pendingPayments: Float!
    averagePayment: Float!
    paymentCompletionRate: Float!
    revenueGrowthPercentage: Float!
    
    # Financial stats
    currentBalance: Float!
    monthlyExpenses: Float!
    
    # Activity stats
    totalTransactions: Int!
    recentPaymentsCount: Int!
    
    # Time-based data for charts
    membershipTrend: [MembershipTrendData!]!
    revenueTrend: [RevenueTrendData!]!
}

type MembershipTrendData {
    month: String!
    newMembers: Int!
    totalMembers: Int!
}

type RevenueTrendData {
    month: String!
    revenue: Float!
    expenses: Float!
}

enum ActivityType {
    MEMBER_REGISTERED
    PAYMENT_RECEIVED
    FAMILY_CREATED
    MEMBER_DEACTIVATED
    TRANSACTION_RECORDED
}

type RecentActivity {
    id: ID!
    type: ActivityType!
    description: String!
    timestamp: Time!
    relatedMember: Member
    relatedFamily: Family
    amount: Float
}

