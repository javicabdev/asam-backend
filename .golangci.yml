# Archivo de configuración para golangci-lint, ajustado para v2.1.6
# Se reintroduce 'version: "2"' ya que v2.1.6 lo requiere explícitamente.
version: "2"

run:
  go: '1.24'
  timeout: 5m
  # La propiedad skip-dirs fue eliminada. Usar linters.skip en su lugar.

linters:
  enable:
    - bodyclose
    - errcheck
    - govet
    - ineffassign
    - noctx
    - staticcheck
    - unused
    - revive
    - unconvert
    # - misspell
    # - gocyclo
    # - gocritic
    # - nolintlint

  # linters.skip reemplaza a run.skip-dirs y run.skip-files.
  # Especifica directorios o archivos a ignorar completamente por todos los linters.
  skip:
    - internal/adapters/gql/generated/ # Directorio a ignorar (nota la barra al final)

  # Se mantienen las exclusiones aquí, ya que v2.1.6 pareció tener problemas
  # con 'issues.exclude-rules' en ejecuciones anteriores.
  exclusions:
    # 'warn-unused' en lugar de 'warn-unused-exclusions' y directamente bajo 'exclusions'.
    warn-unused: true
    rules:
      # Excluir globalmente el issue "package-comments" del linter "revive".
      - linters:
          - revive
        text: "package-comments: should have a package comment"

      # REGLA ACTIVADA: Excluir TODOS los issues del archivo schema.resolvers.go
      - path: internal/adapters/gql/resolvers/schema\.resolvers\.go$
        text: "." # Excluye todos los issues de todos los linters en este path.

      # REGLA COMENTADA: La regla específica para unused-parameter en schema.resolvers.go
      # ya no es necesaria debido a la exclusión general de arriba.
      # - path: internal/adapters/gql/resolvers/schema\.resolvers\.go$
      #   linters:
      #     - revive
      #   text: "unused-parameter: parameter '.*' seems to be unused, consider removing or renaming it as _"

      # Reglas de exclusión generales existentes
      - path: ".*_generated\\.go$"
        text: "." # Excluye todos los issues de todos los linters para estos paths.
      - path: ".*\\.pb\\.go$"
        text: "." # Excluye todos los issues de todos los linters para estos paths.

      - path: "pkg(?:/|\\\\)errors(?:/|\\\\)errors\\.go"
        text: "."

      - path: "_test\\.go$"
        linters:
          - errcheck
          - funlen

# Configuración específica para linters individuales.
# Se mantiene en el nivel raíz.
linters-settings:
  govet:
    check-shadowing: true
  gocyclo:
    min-complexity: 15
  goimports:
    local-prefixes: github.com/javicabdev/asam-backend
  gocritic:
    enabled-tags:
      - diagnostic
      - style
      - performance
  errcheck:
    check-type-assertions: true
  funlen:
    lines: 100
    statements: 50
  revive:
    ignore-generated-header: true
    # confidence: 0.8

issues:
  # Solo se mantienen las configuraciones de 'issues' que no están relacionadas con las reglas de exclusión.
  max-same-issues: 300
  # new-from-rev: HEAD~1
  # max-issues-per-linter: 0
  # exclude-use-default: false

