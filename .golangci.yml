version: 2

run:
  timeout: 6m
  skip-dirs:
    - scripts
    - vendor
    - test/seed/cmd

linters:
  enable:
    - bodyclose
    - errcheck
    - govet
    - ineffassign
    - noctx
    - staticcheck
    - unused
    - unconvert
    - gocyclo

issues:
  max-same-issues: 300
  exclude-rules:
    - path: scripts
      linters:
        - typecheck
