# Configuración para golangci-lint

# Sección 'run': define cómo se ejecuta golangci-lint
run:
  # Versión de Go para la que se analiza el código.
  # Es una buena práctica encerrar los números de versión entre comillas para asegurar que se traten como cadenas.
  go: '1.24' # Asegúrate de que coincida con la versión de Go de tu proyecto y CI.
  # Tiempo máximo de ejecución para los linters.
  timeout: 5m
  # Puedes añadir aquí otras configuraciones de 'run' como:
  # skip-dirs: # Directorios a ignorar por todos los linters.
  #   - vendor/
  #   - internal/mocks/ # Ejemplo para directorios de mocks
  # skip-files: # Esta sección está obsoleta, usar 'issues.exclude-rules' en su lugar.

# Sección 'linters': controla qué linters están habilitados o deshabilitados.
linters:
  # Deshabilita todos los linters por defecto.
  # Solo los linters listados en 'enable' se ejecutarán.
  # Esto proporciona un control explícito sobre qué linters se utilizan.
  disable-all: true
  # Lista de linters a habilitar.
  # Es recomendable empezar con un conjunto básico y añadir más según sea necesario.
  enable:
    - bodyclose     # Verifica que los cuerpos de respuesta HTTP (io.ReadCloser) se cierren.
    - errcheck      # Verifica que los errores devueltos por funciones se manejen.
    - gofmt         # Formatea el código Go según los estándares.
    - goimports     # Organiza las importaciones (las ordena y añade/elimina las necesarias) y las formatea.
    - gosimple      # Sugiere simplificaciones en el código (S1000-S1040 de staticcheck).
    - govet         # Analiza el código en busca de construcciones sospechosas y errores comunes.
    - ineffassign   # Detecta asignaciones inefectivas (variables asignadas pero no usadas).
    - noctx         # Desaconseja pasar un contexto nulo (nil) a funciones que lo esperan.
    - staticcheck   # Un conjunto de analizadores estáticos muy completo y recomendado (incluye gosimple).
    - unused        # Detecta código no utilizado (variables, funciones, tipos, etc. SA4000-SA4029 de staticcheck).
    - revive        # Linter rápido y configurable, sucesor de golint. Configurable mediante un archivo revive.toml.
    - unconvert     # Elimina conversiones de tipo innecesarias.
    - shadow        # Habilitado para versiones recientes de golangci-lint. Detecta variables sombreadas.
    # --- Linters adicionales sugeridos (descomentar para habilitar) ---
    # - misspell      # Corrige errores ortográficos comunes en comentarios y cadenas.
    # - gocyclo       # Calcula la complejidad ciclomática. (Ya lo tienes en linters-settings, asegúrate de habilitarlo aquí si lo quieres).
    # - gocritic      # Proporciona diagnósticos adicionales de estilo y rendimiento. (Ya lo tienes en linters-settings).
    # - nolintlint    # Verifica que las directivas //nolint tengan una justificación o estén bien formadas.

# Sección 'linters-settings': configuraciones específicas para linters individuales.
# Aquí puedes ajustar el comportamiento de los linters habilitados.
linters-settings:
  govet:
  # 'check-shadowing' se maneja ahora por el linter 'shadow' en versiones recientes.
  # check-shadowing: false # O eliminar esta línea si 'shadow' está habilitado.
  # enable-all: false # Por defecto, no todas las comprobaciones de govet están activas.
  # disable:
  #   - fieldalignment # Ejemplo de cómo deshabilitar una comprobación específica de govet.
  gocyclo:
    # Establece la complejidad ciclomática mínima para que gocyclo reporte un problema.
    # Un valor entre 10 y 15 es común.
    min-complexity: 15
  goimports:
    # Prefijos locales para agrupar las importaciones de tu proyecto.
    # Esto ayuda a goimports a ordenar correctamente tus importaciones internas.
    local-prefixes: github.com/javicabdev/asam-backend
  gocritic:
    # Etiquetas de comprobaciones de gocritic a habilitar.
    # 'diagnostic', 'style', y 'performance' son buenos puntos de partida.
    # Puedes encontrar la lista completa de etiquetas en la documentación de gocritic.
    enabled-tags:
      - diagnostic
      - style
      - performance
    # Ejemplo de cómo deshabilitar una comprobación específica de gocritic:
    # disabled-checks:
    #   - commentedOutCode
  errcheck:
    # Habilita la comprobación de aserciones de tipo para errores.
    # Asegura que cuando haces una aserción de tipo, también compruebas el booleano 'ok'.
    check-type-assertions: true
    # También puedes excluir la comprobación de errores para funciones específicas si es necesario:
    # exclude-functions:
    #  - io/ioutil.ReadFile
    #  - (*bytes.Buffer).Write
  funlen:
    # Configuración para el linter 'funlen', que verifica la longitud de las funciones.
    lines: 100      # Número máximo de líneas permitido en una función.
    statements: 50  # Número máximo de declaraciones permitido en una función.
    # misspell:
    # locale: US # Configura la localización para misspell (ej. US, UK, etc.)
    # ignore-words:
    #   - someword # Lista de palabras a ignorar por misspell
    # revive:
    # ignore-generated-header: true
    # confidence: 0.8 # Nivel de confianza mínimo para los problemas reportados por revive.
    # severity: "warning"
    # rules: # Ejemplo de configuración de reglas específicas para revive
    #   - name: package-comments
    #     disabled: true
    # shadow: # Configuración específica para el linter shadow (si es necesario, los defaults suelen ser buenos)
    # strict: false

# Sección 'issues': controla cómo se reportan y manejan los problemas.
issues:
  # Número máximo de problemas idénticos a reportar. 0 para ilimitado.
  max-same-issues: 3
  # Excluir problemas específicos o de ciertos linters en rutas concretas.
  exclude-rules:
    # Para versiones recientes, 'path' solo puede ser suficiente si se aplica a todos los linters.
    # Sin embargo, para mayor claridad o si se quiere aplicar a linters específicos, se puede usar 'linters' o 'text'.
    # La sintaxis con 'path' y 'text: "."' es una forma segura de excluir todos los issues en un path.
    - path: ".*_generated\\.go$"
      text: "." # Excluye todos los linters para estos paths.
    - path: ".*\\.pb\\.go$"
      text: "." # Excluye todos los linters para estos paths.
    - path: "internal/adapters/gql/resolvers/schema.resolvers.go"
      text: "." # Excluye todos los linters para este path.
    - path: "pkg/errors/errors.go"
      text: "." # Excluye todos los linters para este path.

    # Reglas existentes que ya cumplen la condición (path + linters)
    - path: _test\.go # Expresión regular para la ruta del archivo.
      linters:
        - errcheck # Los tests a menudo no comprueban todos los errores intencionadamente.
        - funlen   # Las funciones de test pueden ser más largas.
        # - goconst  # En tests es común repetir strings.
    # - text: "string `(.*)` has complexity" # Expresión regular para el mensaje del problema.
    #   linters:
    #     - gocyclo
    # - path: internal/generated/ # Ejemplo para excluir un directorio generado
    #   text: "SA1029" # Excluir un código de error específico de staticcheck para una ruta
  # Solo mostrar problemas en código nuevo desde una revisión específica (útil para CI/CD).
  # Descomentar y ajustar según la rama principal o la estrategia de integración.
  # new-from-rev: HEAD~1
  # max-issues-per-linter: 0 # Límite de problemas por linter. 0 para ilimitado.
  # exclude-use-default: false # No usar las exclusiones por defecto de golangci-lint (generalmente no recomendado cambiar).
  # exclude: # Lista de mensajes de error exactos a ignorar globalmente (usar con precaución).
  #   - "Error return value of `((os\\.)?std(out|err)\\..*|.*Close|.*Flush|os\\.Remove(All)?|.*printf?|os\\.(Un)?Setenv)$` is not checked" # Ejemplo de errcheck

  # Sección 'output': controla el formato de la salida.
  # output:
  #   formats: # Formatos de salida. 'colored-line-number' es bueno para la terminal.
  #     - colored-line-number
  #     # - json
  #     # - checkstyle
  #     # - junit-xml
  #   print-issued-lines: true  # Imprimir las líneas de código donde se encontró el problema.
  #   print-linter-name: true   # Mostrar el nombre del linter que reportó el problema.
  #   sort-results: true        # Ordenar los resultados.

  # Sección 'severity': permite personalizar la severidad de las reglas.
  # severity:
  # Define reglas para anular la severidad por defecto de ciertos problemas.
  # rules:
  #   - linter: errcheck
  #     severity: error # Tratar todos los problemas de errcheck como errores en lugar de warnings.
  #   - linter: gocritic
  #     check: "unnecessaryBlock" # Identificador de la comprobación específica de gocritic.
  #     severity: "info" # Cambiar la severidad de esta comprobación a 'info'.
