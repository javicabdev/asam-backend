# Configuración para golangci-lint
version: "2"

# Sección 'run': define cómo se ejecuta golangci-lint
run:
  # Versión de Go para la que se analiza el código
  go: '1.24'
  # Tiempo máximo de ejecución para los linters
  timeout: 5m

# Sección 'linters': controla qué linters están habilitados o deshabilitados
linters:
  # En la versión 2, usamos 'default' en lugar de 'disable-all'
  default: none # Opciones: standard, all, none, fast
  
  # Lista de linters a habilitar
  enable:
    - bodyclose
    - errcheck
    - govet
    - ineffassign
    - noctx
    - staticcheck
    - unused
    - revive
    - unconvert

  # Configuraciones simplificadas para linters
  settings:
    gocyclo:
      min-complexity: 15
    errcheck:
      check-type-assertions: true
    funlen:
      lines: 100
      statements: 50

  # Exclusiones - reemplaza 'run.skip-dirs' en v2
  exclusions:
    warn-unused: true
    # Excluir directorios generados
    paths:
      - internal/adapters/gql/generated

    # Reglas de exclusión
    rules:
      # Excluir globalmente el issue "package-comments" del linter "revive"
      - linters:
          - revive
        text: "package-comments: should have a package comment"

      # Excluir específicamente los issues de "unused-parameter" de "revive"
      - path: schema\.resolvers\.go$
        linters:
          - revive
        text: "unused-parameter: parameter 'ctx' seems to be unused, consider removing or renaming it as _"

      # Reglas de exclusión generales existentes
      - path: ".*_generated\\.go$"
        text: "."
      - path: ".*\\.pb\\.go$"
        text: "."

      # Exclusión global para schema.resolvers.go
      - path: schema\.resolvers\.go$
        text: "."

      # Path corregido para pkg/errors/errors.go
      - path: "pkg(?:/|\\\\)errors(?:/|\\\\)errors\\.go"
        text: "."

      # Exclusión para archivos de test
      - path: "_test\\.go$"
        linters:
          - errcheck
          - funlen

# Sección 'issues': controla cómo se reportan y manejan los problemas
issues:
  max-same-issues: 300

# Sección 'output'
output:
  formats:
    text:
      path: stdout
      print-issued-lines: true
      print-linter-name: true
      colors: true
