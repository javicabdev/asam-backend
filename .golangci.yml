# Archivo de configuración para golangci-lint v2.1.6
version: "2"

run:
  go: '1.24'
  timeout: 5m

linters:
  enable:
    - bodyclose
    - errcheck
    - govet
    - ineffassign
    - noctx
    - staticcheck
    - unused
    - revive
    - unconvert
    - gocyclo
    - gosimple
    - typecheck

  # Configuración específica para linters
  settings:
    gocyclo:
      min-complexity: 15
    funlen:
      lines: 100
      statements: 50
    revive:
      ignore-generated-header: true
      rules:
        - name: exported
          severity: warning
        - name: context-keys-type
          severity: error
        - name: package-comments
          disabled: true
    govet:
      check-shadowing: true

  # Reglas de exclusión
  exclusions:
    warn-unused: true
    rules:
      # Excluir globalmente el issue "package-comments" del linter "revive".
      - linters:
          - revive
        text: "package-comments: should have a package comment"

      # Excluir issues del archivo schema.resolvers.go
      - path: internal/adapters/gql/resolvers/schema\.resolvers\.go$
        text: "." # Excluye todos los issues de todos los linters en este path.

      # Excluir issues del directorio generated
      - path: internal/adapters/gql/generated/
        text: "." # Excluye todos los issues de todos los linters en este path.

      # Reglas de exclusión generales
      - path: ".*_generated\\.go$"
        text: "."
      - path: ".*\\.pb\\.go$"
        text: "."
      - path: "pkg(?:/|\\\\)errors(?:/|\\\\)errors\\.go"
        text: "."
      - path: "_test\\.go$"
        linters:
          - errcheck
          - funlen

formatters:
  settings:
    goimports:
      local-prefixes:
        - github.com/javicabdev/asam-backend

issues:
  max-same-issues: 300