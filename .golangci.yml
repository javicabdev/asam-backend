# Configuración para golangci-lint versión 2
linters-settings:
  gocyclo:
    min-complexity: 15
  errcheck:
    check-type-assertions: true
  funlen:
    lines: 100
    statements: 50
  govet:
    check-shadowing: true

# Sección 'run': define cómo se ejecuta golangci-lint
run:
  # Versión de Go para la que se analiza el código
  go: '1.24'
  # Tiempo máximo de ejecución para los linters
  timeout: 5m
  # Excluir directorios específicos (formato moderno en golangci-lint v2)
  skip-dirs:
    - internal/adapters/gql/generated

# Sección 'linters': controla qué linters están habilitados o deshabilitados
linters:
  # En la versión 2, usamos 'disable-all' y luego 'enable'
  disable-all: true
  
  # Lista de linters a habilitar
  enable:
    - bodyclose
    - errcheck
    - govet
    - ineffassign
    - noctx
    - staticcheck
    - unused
    - revive
    - unconvert
    
# Sección 'issues': controla cómo se reportan y manejan los problemas detectados
issues:
  # Excluir ciertos issues por paths y texto
  exclude-rules:
    # Excluir globalmente el issue "package-comments" del linter "revive"
    - linters:
        - revive
      text: "package-comments: should have a package comment"

    # Excluir issues de "unused-parameter" para schema.resolvers.go
    - path: internal/adapters/gql/resolvers/schema\.resolvers\.go$
      linters:
        - revive
      text: "unused-parameter: parameter 'ctx' seems to be unused, consider removing or renaming it as _"

    # Reglas generales para archivos generados automáticamente
    - path: ".*_generated\\.go$"
      text: ".*"
    - path: ".*\\.pb\\.go$"
      text: ".*"

    # Exclusión específica para schema.resolvers.go
    - path: internal/adapters/gql/resolvers/schema\.resolvers\.go$
      text: ".*"

    # Exclusión para archivos de test
    - path: "_test\\.go$"
      linters:
        - errcheck
        - funlen

  # Configuración adicional para issues
  max-same-issues: 300

# Sección 'output'
output:
  formats:
    text:
      path: stdout
      print-issued-lines: true
      print-linter-name: true
      colors: true
