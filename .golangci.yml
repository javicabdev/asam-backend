run:
  timeout: 5m
  go: '1.24'
  tests: true
  # Eliminar estas opciones obsoletas
  # skip-dirs:
  #   - test/integration
  # skip-files:
  #   - ".*_test.go$"

linters:
  enable:
    - errcheck
    - gosimple
    - govet
    - ineffassign
    - staticcheck
    - typecheck
    - unused
    - bodyclose
    - dupl
    - funlen
    # - gocognit    # Deshabilitado
    # - goconst     # Deshabilitado
    - gocritic
    - gocyclo
    # - godot       # Deshabilitado
    - gofmt
    - goimports
    - gosec
    # - lll         # Deshabilitado
    # - misspell    # Deshabilitado
    - nakedret
    - prealloc
    - revive
    - stylecheck
    - unconvert
    - unparam
    - whitespace
    # No añadir 'shadow' aquí

  disable:
    - misspell    # Deshabilitar errores ortográficos
    - gocognit    # Deshabilitar complejidad cognitiva
    - lll         # Deshabilitar límite de longitud de línea
    - goconst     # Deshabilitar obligación de constantes
    - godot       # Deshabilitar punto final en comentarios

linters-settings:
  errcheck:
    check-type-assertions: true
    check-blank: true

  funlen:
    lines: 100
    statements: 50

  gocognit:
    min-complexity: 15

  gocyclo:
    min-complexity: 15

  lll:
    line-length: 120

  nakedret:
    max-func-lines: 30

  # Quitar la configuración obsoleta para govet
  # govet:
  #   check-shadowing: true

  revive:
    rules:
      - name: exported
        arguments:
          - "disableStutteringCheck"

  gosec:
    excludes:
      - G104 # Disable "Audit errors not checked" for certain cases

issues:
  exclude-rules:
    - path: _test\.go
      linters:
        - dupl
        - gosec
        - funlen
        - errcheck

    # Ignorar errores de errcheck en funciones relacionadas con tx.Rollback()
    - text: "Error return value of `tx.Rollback` is not checked"
      linters:
        - errcheck

    # Ignorar otros errores comunes
    - text: "Error return value of `(\\*encoding/json\\.Encoder).Encode` is not checked"
      linters:
        - errcheck
    
    - text: "Error return value of `godotenv.Load` is not checked"
      linters:
        - errcheck

    - text: "G404: Use of weak random number generator"
      linters:
        - gosec

    - text: "G112: Potential Slowloris Attack"
      linters:
        - gosec

    - text: "SA1029: should not use built-in type string as key for value"
      linters:
        - staticcheck

  # Añadir estas opciones nuevas en reemplazo de las obsoletas
  exclude-dirs:
    - test/integration
  exclude-files:
    - ".*_test.go$"

  max-same-issues: 3
  max-issues-per-linter: 10