# golangci-lint configuration for v2.1.6
version: "2"

run:
  timeout: 5m
  tests: false
  build-tags: []
  modules-download-mode: readonly
  allow-parallel-runners: false

linters:
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - whitespace
    - revive
    - bodyclose
    - dupl
    - goconst
    - gocritic
    - gocyclo
    - nakedret
    - prealloc
    - unconvert
    - unparam
    - gosec
    - exhaustive
    - gochecknoinits
    - goprintffuncname
    - noctx
    - nolintlint
    - rowserrcheck
    - sqlclosecheck
    - bidichk
    - durationcheck
    - errname
    - forcetypeassert
    - makezero
    - nilerr
    - wastedassign

  settings:
    errcheck:
      check-type-assertions: true
      check-blank: false

    govet:
      enable-all: false

    gocyclo:
      min-complexity: 15

    dupl:
      threshold: 150

    goconst:
      min-len: 3
      min-occurrences: 3

    unused:
      exported-fields-are-used: true

    unparam:
      check-exported: false

    nakedret:
      max-func-lines: 30

    prealloc:
      simple: true
      range-loops: true
      for-loops: false

    gocritic:
      enabled-checks:
        - nestingReduce
        - unnamedResult
        - ruleguard
        - truncateCmp

    revive:
      confidence: 0.8
      severity: warning
      rules:
        - name: package-comments
          disabled: true
        - name: exported
          disabled: true

    exhaustive:
      default-signifies-exhaustive: true

    nolintlint:
      allow-unused: false
      require-explanation: true
      require-specific: true

  exclusions:
    rules:
      # Allow init functions in cmd
      - path: cmd/.*\.go
        linters:
          - gochecknoinits

      # Reduce noise in cmd utility scripts
      - path: cmd/.*\.go
        linters:
          - revive
          - gocyclo
          - goconst
          - staticcheck
          - govet

      # Exclude generated files
      - path: '.*\.pb\.go$'
        linters:
          - revive
          - govet
          - staticcheck
          - unused

      - path: '.*\.gen\.go$'
        linters:
          - revive
          - govet
          - staticcheck
          - unused

      # Exclude gosec G304 in memory.go - paths are validated with multiple layers
      # See memory.go lines 55-67 (input validation) and isValidOutputPath()
      - path: pkg/monitoring/memory\.go
        text: "G304.*Potential file inclusion"
        linters:
          - gosec

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
  new: false
  fix: false
