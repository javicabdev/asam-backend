# Archivo de configuración para golangci-lint, ajustado para v2.1.6
version: "2"

run:
  go: '1.24'
  timeout: 5m

linters:
  enable:
    - bodyclose
    - errcheck
    - govet
    - ineffassign
    - noctx
    - staticcheck
    - unused
    - revive
    - unconvert
    # - misspell
    # - gocyclo
    # - gocritic
    # - nolintlint

  # Configuración específica para linters individuales (nueva estructura para v2)
  settings:
    govet:
      check-shadowing: true
    gocyclo:
      min-complexity: 15
    gocritic:
      enabled-tags:
        - diagnostic
        - style
        - performance
    errcheck:
      check-type-assertions: true
    funlen:
      lines: 100
      statements: 50
    revive:
      ignore-generated-header: true # Para que revive ignore archivos con cabeceras de generación automática.
      # confidence: 0.8

  # 'linters.skip' fue eliminado ya que causaba error de validación con v2.1.6 en CI.
  # Las exclusiones de archivos/directorios se manejarán en 'linters.exclusions.rules'.

  exclusions:
    warn-unused: true
    rules:
      # Excluir globalmente el issue "package-comments" del linter "revive".
      - linters:
          - revive
        text: "package-comments: should have a package comment"

      # REGLA ACTIVADA: Excluir TODOS los issues del archivo schema.resolvers.go
      - path: internal/adapters/gql/resolvers/schema\.resolvers\.go$
        text: "." # Excluye todos los issues de todos los linters en este path.

      # NUEVA REGLA: Excluir TODOS los issues del directorio generated
      - path: internal/adapters/gql/generated/
        text: "." # Excluye todos los issues de todos los linters en este path.

      # Reglas de exclusión generales existentes
      - path: ".*_generated\\.go$" # Esta podría ser redundante si los archivos están en el dir de arriba
        text: "."
      - path: ".*\\.pb\\.go$"
        text: "."
      - path: "pkg(?:/|\\\\)errors(?:/|\\\\)errors\\.go"
        text: "."
      - path: "_test\\.go$"
        linters:
          - errcheck
          - funlen

formatters:
  settings:
    goimports:
      local-prefixes: github.com/javicabdev/asam-backend

issues:
  max-same-issues: 300

    # 'issues.exclude' se usa para patrones de texto de error, no para excluir archivos/directorios.
    # Por lo tanto, las entradas anteriores para archivos/directorios se han eliminado de aquí.
    # exclude:
    # - internal/adapters/gql/generated/
  # - internal/adapters/gql/resolvers/schema\.resolvers\.go

  # Opcional: Si no quieres las exclusiones por defecto de golangci-lint (como vendor, testdata),
  # puedes descomentar la siguiente línea. Por ahora, la dejamos comentada.
  # exclude-use-default: false

