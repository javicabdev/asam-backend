version: 2
updates:
  # Go modules
  - package-ecosystem: "gomod"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "08:00"
    open-pull-requests-limit: 5
    groups:
      go-indirect:
        dependency-type: "development"
        update-types:
          - "minor"
          - "patch"
    ignore:
      # Preload broken in gorm 1.31.1 — see go-gorm/gorm#7686
      # Remove this ignore once upstream fixes it.
      - dependency-name: "gorm.io/gorm"
        versions: ["1.31.1"]

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "08:00"
    open-pull-requests-limit: 3
    groups:
      github-actions:
        patterns: ["*"]

  # Docker
  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "08:00"
    open-pull-requests-limit: 2
