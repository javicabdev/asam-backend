version: 2
updates:
  # Go modules
  - package-ecosystem: "gomod"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "08:00"
    reviewers:
      - "javicabdev"
    labels:
      - "dependencies"
      - "go"
    open-pull-requests-limit: 5
    
  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "08:00"
    reviewers:
      - "javicabdev"
    labels:
      - "dependencies"
      - "github-actions"
    open-pull-requests-limit: 3
    
  # Docker
  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "08:00"
    reviewers:
      - "javicabdev"
    labels:
      - "dependencies"
      - "docker"
    open-pull-requests-limit: 2