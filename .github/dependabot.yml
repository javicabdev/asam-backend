# Configuración de Dependabot para mantener las dependencias actualizadas
# Para más info: https://docs.github.com/github/administering-a-repository/configuration-options-for-dependency-updates

version: 2
updates:
  # Mantener las dependencias de Go actualizadas
  - package-ecosystem: "gomod"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "go"
    commit-message:
      prefix: "deps"
      include: "scope"
    # Límites de versión para controlar qué actualizaciones permitir
    # Solo permitimos actualizaciones de parches y versiones menores, no cambios mayores
    versioning-strategy: auto
    ignore:
      # Ignora actualizaciones de versiones mayores por seguridad
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]

  # Mantener las acciones de GitHub actualizadas
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "wednesday"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "github-actions"
    commit-message:
      prefix: "ci"
      include: "scope"

  # Mantener las imágenes de Docker actualizadas (si se usa Dockerfile)
  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "friday"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "docker"
    commit-message:
      prefix: "docker"
      include: "scope"
