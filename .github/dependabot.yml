version: 2
updates:
  # Mantener las dependencias de Go actualizadas
  - package-ecosystem: "gomod"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "go"
    commit-message:
      prefix: "chore(deps)"
    groups:
      go-dependencies:
        patterns:
          - "*"

  # Mantener las acciones de GitHub Actions actualizadas
  - package-ecosystem: "github-actions"
    directory: "/.github/workflows"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 3
    labels:
      - "dependencies"
      - "github_actions"
    commit-message:
      prefix: "chore(ci)"
    groups:
      actions-dependencies:
        patterns:
          - "*"
