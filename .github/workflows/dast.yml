name: DAST Security Scan

on:
  # Run on manual trigger
  workflow_dispatch:
    inputs:
      target_url:
        description: 'Target URL to scan (e.g., https://your-staging-url.com)'
        required: true
        type: string
      scan_type:
        description: 'Type of scan to perform'
        required: true
        default: 'baseline'
        type: choice
        options:
          - baseline  # Quick scan (2-3 minutes)
          - full      # Full scan (10+ minutes)
          - api       # API-specific scan

  # Optionally run on schedule (weekly on staging)
  schedule:
    - cron: '0 2 * * 0'  # Every Sunday at 2 AM

permissions:
  contents: read
  security-events: write
  issues: write

env:
  # Default target URL (can be overridden by workflow_dispatch)
  DEFAULT_TARGET_URL: 'https://asam-backend-production-790554948721.us-central1.run.app'

jobs:
  dast-scan:
    name: OWASP ZAP Security Scan
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set target URL
        id: set-url
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "target_url=${{ inputs.target_url }}" >> $GITHUB_OUTPUT
            echo "scan_type=${{ inputs.scan_type }}" >> $GITHUB_OUTPUT
          else
            echo "target_url=${{ env.DEFAULT_TARGET_URL }}" >> $GITHUB_OUTPUT
            echo "scan_type=baseline" >> $GITHUB_OUTPUT
          fi

      - name: Run OWASP ZAP Baseline Scan
        if: steps.set-url.outputs.scan_type == 'baseline'
        uses: zaproxy/action-baseline@v0.12.0
        with:
          target: ${{ steps.set-url.outputs.target_url }}
          rules_file_name: '.zap/rules.tsv'
          cmd_options: '-a -j -l WARN'
          fail_action: false
          allow_issue_writing: true

      - name: Run OWASP ZAP Full Scan
        if: steps.set-url.outputs.scan_type == 'full'
        uses: zaproxy/action-full-scan@v0.10.0
        with:
          target: ${{ steps.set-url.outputs.target_url }}
          rules_file_name: '.zap/rules.tsv'
          cmd_options: '-a -j -l WARN'
          fail_action: false
          allow_issue_writing: true

      - name: Run OWASP ZAP API Scan
        if: steps.set-url.outputs.scan_type == 'api'
        uses: zaproxy/action-api-scan@v0.7.0
        with:
          target: ${{ steps.set-url.outputs.target_url }}/graphql
          format: openapi
          rules_file_name: '.zap/rules.tsv'
          cmd_options: '-a -j -l WARN'
          fail_action: false
          allow_issue_writing: true

      - name: Upload ZAP Scan Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: zap-scan-results
          path: |
            zap-baseline-report.html
            zap-baseline-report.json
            zap-full-report.html
            zap-full-report.json
            zap-api-report.html
            zap-api-report.json

      - name: Create Summary
        if: always()
        run: |
          echo "## DAST Security Scan Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Target URL:** ${{ steps.set-url.outputs.target_url }}" >> $GITHUB_STEP_SUMMARY
          echo "**Scan Type:** ${{ steps.set-url.outputs.scan_type }}" >> $GITHUB_STEP_SUMMARY
          echo "**Scan Date:** $(date -u +'%Y-%m-%d %H:%M:%S UTC')" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ -f "zap-baseline-report.json" ] || [ -f "zap-full-report.json" ] || [ -f "zap-api-report.json" ]; then
            echo "✅ Scan completed successfully" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "📊 Check the uploaded artifacts for detailed reports" >> $GITHUB_STEP_SUMMARY
          else
            echo "⚠️ No scan results found" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Comment on PR (if applicable)
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let reportContent = '## 🔒 DAST Security Scan Results\n\n';

            try {
              // Try to read the JSON report
              const report = JSON.parse(fs.readFileSync('zap-baseline-report.json', 'utf8'));
              reportContent += `**Target:** ${report.site}\n`;
              reportContent += `**Alerts:** ${report.alerts.length}\n\n`;

              // Summarize by risk level
              const highRisk = report.alerts.filter(a => a.risk === 'High').length;
              const mediumRisk = report.alerts.filter(a => a.risk === 'Medium').length;
              const lowRisk = report.alerts.filter(a => a.risk === 'Low').length;

              reportContent += `- 🔴 High: ${highRisk}\n`;
              reportContent += `- 🟡 Medium: ${mediumRisk}\n`;
              reportContent += `- 🟢 Low: ${lowRisk}\n\n`;

              reportContent += 'See artifacts for full report.';
            } catch (e) {
              reportContent += 'Report parsing failed. Check artifacts for details.';
            }

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: reportContent
            });
