name: DAST Security Scan

on:
  # Run on manual trigger
  workflow_dispatch:
    inputs:
      target_url:
        description: 'URL a escanear (vacío = usar variable del repo DAST_TARGET_URL)'
        required: false
        type: string
      scan_type:
        description: 'Type of scan to perform'
        required: true
        default: 'baseline'
        type: choice
        options:
          - baseline  # Quick scan (2-3 minutes)
          - full      # Full scan (10+ minutes)
          - api       # API-specific scan

  # Optionally run on schedule (weekly on staging)
  schedule:
    - cron: '0 2 * * 0'  # Every Sunday at 2 AM

permissions:
  contents: read
  security-events: write
  issues: write

env:
  # URL por defecto: variable del repositorio DAST_BACKEND_URL (Settings → Secrets and variables → Actions → Variables).
  # Apunta al servicio Cloud Run del backend (NO al frontend mutuaasam.org).
  # También puedes pasar "target_url" al ejecutar el workflow a mano.
  DEFAULT_BACKEND_URL: ${{ vars.DAST_BACKEND_URL }}

jobs:
  dast-scan:
    name: OWASP ZAP Security Scan
    # Manual: siempre corre. Cron: solo si existe DAST_TARGET_URL (si no, skipped, no failed).
    if: ${{ github.event_name == 'workflow_dispatch' || vars.DAST_BACKEND_URL != '' }}
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5

      - name: Set target URL
        id: set-url
        run: |
          # Manual: inputs.target_url. Programado: vars.DAST_BACKEND_URL
          TARGET="${{ inputs.target_url }}"
          if [ -z "$TARGET" ]; then
            TARGET="${{ env.DEFAULT_BACKEND_URL }}"
          fi
          if [ -z "$TARGET" ]; then
            echo "::error::Define la variable del repositorio DAST_BACKEND_URL (URL base del API en Cloud Run, p. ej. https://asam-backend-xxx.a.run.app) o ejecuta el workflow con target_url."
            exit 1
          fi
          echo "target_url=$TARGET" >> $GITHUB_OUTPUT

          # Use provided scan_type or default to baseline
          if [ -n "${{ inputs.scan_type }}" ]; then
            echo "scan_type=${{ inputs.scan_type }}" >> $GITHUB_OUTPUT
          else
            echo "scan_type=baseline" >> $GITHUB_OUTPUT
          fi

      - name: Run OWASP ZAP Baseline Scan
        if: steps.set-url.outputs.scan_type == 'baseline'
        uses: zaproxy/action-baseline@de8ad967d3548d44ef623df22cf95c3b0baf8b25  # v0.15.0
        with:
          target: ${{ steps.set-url.outputs.target_url }}
          rules_file_name: '.zap/rules.tsv'
          cmd_options: '-a -j -l WARN'
          fail_action: false
          allow_issue_writing: true

      - name: Run OWASP ZAP Full Scan
        if: steps.set-url.outputs.scan_type == 'full'
        uses: zaproxy/action-full-scan@3c58388149901b9a03b7718852c5ba889646c27c  # v0.13.0
        with:
          target: ${{ steps.set-url.outputs.target_url }}
          rules_file_name: '.zap/rules.tsv'
          cmd_options: '-a -j -l WARN'
          fail_action: false
          allow_issue_writing: true

      - name: Run OWASP ZAP API Scan
        if: steps.set-url.outputs.scan_type == 'api'
        uses: zaproxy/action-api-scan@5158fe4d9d8fcc75ea204db81317cce7f9e5453d  # v0.10.0
        with:
          target: ${{ steps.set-url.outputs.target_url }}/graphql
          format: graphql
          rules_file_name: '.zap/rules.tsv'
          cmd_options: '-a -j -l WARN'
          fail_action: false
          allow_issue_writing: true

      - name: Upload ZAP Scan Results
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7
        with:
          name: zap-scan-results
          if-no-files-found: ignore
          path: |
            report_html.html
            report_json.json
            report_md.md

      - name: Create Summary
        if: always()
        run: |
          echo "## DAST Security Scan Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Target URL:** ${{ steps.set-url.outputs.target_url }}" >> $GITHUB_STEP_SUMMARY
          echo "**Scan Type:** ${{ steps.set-url.outputs.scan_type }}" >> $GITHUB_STEP_SUMMARY
          echo "**Scan Date:** $(date -u +'%Y-%m-%d %H:%M:%S UTC')" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ -f "report_json.json" ]; then
            echo "✅ Scan completed successfully" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "📊 Check the uploaded artifacts for detailed reports" >> $GITHUB_STEP_SUMMARY
          else
            echo "⚠️ No scan results found" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Comment on PR (if applicable)
        if: github.event_name == 'pull_request'
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b  # v7
        with:
          script: |
            const fs = require('fs');
            let reportContent = '## 🔒 DAST Security Scan Results\n\n';

            try {
              // Try to read the JSON report
              const report = JSON.parse(fs.readFileSync('report_json.json', 'utf8'));
              reportContent += `**Target:** ${report.site}\n`;
              reportContent += `**Alerts:** ${report.alerts.length}\n\n`;

              // Summarize by risk level
              const highRisk = report.alerts.filter(a => a.risk === 'High').length;
              const mediumRisk = report.alerts.filter(a => a.risk === 'Medium').length;
              const lowRisk = report.alerts.filter(a => a.risk === 'Low').length;

              reportContent += `- 🔴 High: ${highRisk}\n`;
              reportContent += `- 🟡 Medium: ${mediumRisk}\n`;
              reportContent += `- 🟢 Low: ${lowRisk}\n\n`;

              reportContent += 'See artifacts for full report.';
            } catch (e) {
              reportContent += 'Report parsing failed. Check artifacts for details.';
            }

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: reportContent
            });
