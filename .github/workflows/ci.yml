name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache: false

      # Limpiamos el directorio de módulos para evitar conflictos
      - name: Clean Go module cache completely
        run: |
          go clean -modcache
          go clean -cache
        continue-on-error: true

      # Estrategia de caché mejorada
      - name: Cache Go modules
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}-
            ${{ runner.os }}-go-
        # Configuración adicional para manejo de caché
        # Usar restore-mode: copy para prevenir sobreescritura de archivos existentes
        env:
          SEGMENT_DOWNLOAD_TIMEOUT_MINS: 5
          
      # Aseguramos que los directorios de módulos estén disponibles
      - name: Ensure Go module directories
        run: |
          mkdir -p ~/go/pkg/mod
          
      # Descargar las dependencias
      - name: Download dependencies
        run: |
          go mod tidy
          go mod download
        
      # Verificar integridad de dependencias
      - name: Verify dependencies
        run: go mod verify

      # Ejecutar los tests
      - name: Run tests
        run: go test -v ./...

      # Construir la aplicación
      - name: Build
        run: go build -v ./...

      # Ejecutar linter
      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v5
        with:
          version: latest
          args: --timeout=5m
