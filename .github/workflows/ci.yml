name: Continuous Integration

on:
  push:
    branches: [ main ]
    paths-ignore:
      - '**/*.md'
      - '.gitignore'
      - 'LICENSE'
  pull_request:
    branches: [ main ]
  workflow_dispatch:

# Permisos necesarios para GitHub Security
permissions:
  contents: read
  security-events: write
  actions: read

env:
  GO_VERSION: '1.26.3'
  POSTGRES_USER: postgres
  POSTGRES_PASSWORD: postgres
  POSTGRES_DB: asam_test
  POSTGRES_PORT: "5432"

jobs:
  # Job para configurar el entorno base, descargar dependencias y generar código.
  setup:
    name: Setup Environment & Generate Code
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c  # v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Verify dependencies
        run: |
          go mod download
          go mod verify

      - name: Generate GraphQL code
        run: go run github.com/99designs/gqlgen@v0.17.73 generate

      - name: Upload workspace artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7
        with:
          name: workspace
          path: .

  lint:
    name: Lint Code
    needs: setup
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Download workspace artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: workspace
          path: .

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c  # v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Install and run golangci-lint
        uses: golangci/golangci-lint-action@82606bf257cbaff209d206a39f5134f0cfbfd2ee  # v9
        with:
          version: v2.5.0
          install-mode: goinstall
          args: --timeout=5m ./cmd/api/... ./internal/... ./pkg/... ./test/...

  security:
    name: Security Scan (SAST)
    needs: setup
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3

      - name: Download workspace artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: workspace
          path: .

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c  # v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Run gosec security scanner
        uses: securego/gosec@9e6a9843d7a4a6e3e9a8539b02612c8a4aa3f889  # v2.27.1
        with:
          args: '-no-fail -fmt json -out gosec-results.json ./...'

      - name: Display gosec results
        if: always()
        run: |
          if [ -f gosec-results.json ]; then
            echo "Security scan completed. Results:"
            cat gosec-results.json | jq -r '.Issues[] | "[\(.severity)] \(.file):\(.line) - \(.details)"' || cat gosec-results.json
          fi

  test:
    name: Run Tests
    needs: setup
    runs-on: ubuntu-latest
    timeout-minutes: 20
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: ${{ env.POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ env.POSTGRES_PASSWORD }}
          POSTGRES_DB: ${{ env.POSTGRES_DB }}
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Download workspace artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: workspace
          path: .

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c  # v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Run unit tests with coverage
        run: make test-unit-coverage
        env:
          JWT_ACCESS_SECRET: "test-access-secret-for-unit-tests"
          JWT_REFRESH_SECRET: "test-refresh-secret-for-unit-tests"
          ENVIRONMENT: "test_unit"

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f  # v7.0.0
        with:
          files: ./coverage-unit.out
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false

      - name: Wait for PostgreSQL to be ready
        run: |
          timeout 60 bash -c 'until pg_isready -h localhost -p ${{ env.POSTGRES_PORT }} -U ${{ env.POSTGRES_USER }}; do
            echo "Waiting for PostgreSQL..."
            sleep 2
          done'
        env:
          PGPASSWORD: ${{ env.POSTGRES_PASSWORD }}

      - name: Run database migrations
        run: go run cmd/migrate/main.go -cmd up
        env:
          DB_HOST: localhost
          DB_PORT: ${{ env.POSTGRES_PORT }}
          DB_USER: ${{ env.POSTGRES_USER }}
          DB_PASSWORD: ${{ env.POSTGRES_PASSWORD }}
          DB_NAME: ${{ env.POSTGRES_DB }}
          DB_SSL_MODE: "disable"

      - name: Run integration tests
        run: make test-integration
        env:
          DB_HOST: localhost
          DB_PORT: ${{ env.POSTGRES_PORT }}
          DB_USER: ${{ env.POSTGRES_USER }}
          DB_PASSWORD: ${{ env.POSTGRES_PASSWORD }}
          DB_NAME: ${{ env.POSTGRES_DB }}
          DB_SSL_MODE: "disable"
          JWT_ACCESS_SECRET: "test-access-secret-for-ci"
          JWT_REFRESH_SECRET: "test-refresh-secret-for-ci"
          ENVIRONMENT: "test"
          CI: "true"
