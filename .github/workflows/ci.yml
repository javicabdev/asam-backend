name: Continuous Integration

on:
  push:
    branches: [ main ]
    paths-ignore:
      - '**/*.md'
      - '.gitignore'
      - 'LICENSE'
  pull_request:
    branches: [ main ]
  workflow_dispatch:

env:
  GO_VERSION: '1.24'
  POSTGRES_USER: postgres
  POSTGRES_PASSWORD: postgres
  POSTGRES_DB: asam_test
  POSTGRES_PORT: "5432"

jobs:
  # Job para configurar el entorno base, descargar dependencias y generar código.
  setup:
    name: Setup Environment & Generate Code
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Verify dependencies
        run: |
          go mod download
          go mod verify

      - name: Generate GraphQL code
        run: go run github.com/99designs/gqlgen@v0.17.73 generate

      - name: Upload workspace artifact
        uses: actions/upload-artifact@v4
        with:
          name: workspace
          path: .

  # Job 'lint' modificado para usar 'make lint' y la versión específica de golangci-lint.
  lint:
    name: Lint Code
    needs: setup
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Download workspace artifact
        uses: actions/download-artifact@v4
        with:
          name: workspace
          path: .

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Install golangci-lint v2.1.6
        uses: golangci/golangci-lint-action@v6
        with:
          # Usando la versión específica que necesitas.
          version: v2.1.6
          # La opción 'install-only' asegura que solo se instale la herramienta.
          # La ejecución se delega al Makefile.
          install-only: true

      - name: Run linter via Makefile
        # Ejecutando el comando 'make lint' como has solicitado.
        run: make lint

  test:
    name: Run Tests
    needs: setup
    runs-on: ubuntu-latest
    timeout-minutes: 20
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: ${{ env.POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ env.POSTGRES_PASSWORD }}
          POSTGRES_DB: ${{ env.POSTGRES_DB }}
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Download workspace artifact
        uses: actions/download-artifact@v4
        with:
          name: workspace
          path: .

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Run unit tests with coverage
        run: make test-unit-coverage
        env:
          JWT_ACCESS_SECRET: "test-access-secret-for-unit-tests"
          JWT_REFRESH_SECRET: "test-refresh-secret-for-unit-tests"
          ENVIRONMENT: "test_unit"

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage-unit.out
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false

      - name: Wait for PostgreSQL to be ready
        run: |
          timeout 60 bash -c 'until pg_isready -h localhost -p ${{ env.POSTGRES_PORT }} -U ${{ env.POSTGRES_USER }}; do
            echo "Waiting for PostgreSQL..."
            sleep 2
          done'
        env:
          PGPASSWORD: ${{ env.POSTGRES_PASSWORD }}

      - name: Run database migrations
        run: go run cmd/migrate/main.go -cmd up
        env:
          DB_HOST: localhost
          DB_PORT: ${{ env.POSTGRES_PORT }}
          DB_USER: ${{ env.POSTGRES_USER }}
          DB_PASSWORD: ${{ env.POSTGRES_PASSWORD }}
          DB_NAME: ${{ env.POSTGRES_DB }}
          DB_SSL_MODE: "disable"

      - name: Run integration tests
        run: make test-integration
        env:
          DB_HOST: localhost
          DB_PORT: ${{ env.POSTGRES_PORT }}
          DB_USER: ${{ env.POSTGRES_USER }}
          DB_PASSWORD: ${{ env.POSTGRES_PASSWORD }}
          DB_NAME: ${{ env.POSTGRES_DB }}
          DB_SSL_MODE: "disable"
          JWT_ACCESS_SECRET: "test-access-secret-for-ci"
          JWT_REFRESH_SECRET: "test-refresh-secret-for-ci"
          ENVIRONMENT: "test"
          CI: "true"