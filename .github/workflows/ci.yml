name: Backend CI Pipeline

on:
  push:
    branches: [ main, develop ]
    paths-ignore:
      - '**/*.md'
  pull_request:
    branches: [ main, develop ]
    paths-ignore:
      - '**/*.md'

jobs:
  lint-and-prepare:
    name: Lint and Prepare
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache: true

      # 1. Generar código (Necesario antes de lint, build, test)
      - name: Generate GraphQL code
        run: go run ./cmd/generate

      # 2. Aplicar parches al código generado para hacerlo compatible con Go 1.24
      - name: Fix GraphQL Generated Code
        run: |
          GENERATED_FILE=internal/adapters/gql/generated/generated.go
          if [ -f "$GENERATED_FILE" ]; then
            echo "Aplicando parches al código generado..."
            
            # 1. Cambiar la importación de sync/atomic
            sed -i 's/"sync\/atomic"/"sync\/atomic\/v2"/g' "$GENERATED_FILE"
            
            # 2. Corregir referencias a DisableIntrospection
            sed -i 's/if ec.DisableIntrospection {/if ec.OperationContext.DisableIntrospection {/g' "$GENERATED_FILE"
            
            # 3. Corregir referencias a Error y Recover
            sed -i 's/ec.Error(ctx, ec.Recover(ctx, r))/graphql.AddError(ctx, ec.Recover(ctx, r))/g' "$GENERATED_FILE"
            sed -i 's/ec.Error(ctx, err)/graphql.AddError(ctx, err)/g' "$GENERATED_FILE"
            sed -i 's/ec.Errorf(ctx, "must not be null")/graphql.AddError(ctx, fmt.Errorf("must not be null"))/g' "$GENERATED_FILE"
            
            # 4. Corregir referencias a ResolverMiddleware
            sed -i 's/resTmp, err := ec.ResolverMiddleware(ctx, func(rctx context.Context) (any, error) {/resTmp, err := ec.OperationContext.ResolverMiddleware(ctx, func(rctx context.Context) (any, error) {/g' "$GENERATED_FILE"
            
            echo "Parches aplicados correctamente."
          else
            echo "Error: No se encontró el archivo generado en $GENERATED_FILE"
            exit 1
          fi

      # 3. Ordenar y descargar dependencias finales
      - name: Tidy Go modules
        run: go mod tidy

      - name: Download Go modules
        run: go mod download

      # 4. Ejecutar Linter usando la Acción Oficial
      - name: Run golangci-lint using Action
        uses: golangci/golangci-lint-action@v8
        with:
          version: v1.58.0
          args: --timeout=5m

      # --- Resto de verificaciones (Formato) ---
      - name: Verify gofmt
        run: |
          OUTPUT=$(gofmt -s -l .)
          if [ -n "$OUTPUT" ]; then
            echo "::warning::The following files are not formatted with gofmt:"
            echo "$OUTPUT"
          else
            echo "All files are correctly formatted with gofmt."
          fi

      - name: Validate imports (goimports)
        run: |
          go install golang.org/x/tools/cmd/goimports@latest
          OUTPUT=$(goimports -l .)
          if [ -n "$OUTPUT" ]; then
            echo "::warning::The following files have import formatting issues:"
            echo "$OUTPUT"
          else
            echo "All imports are correctly formatted."
          fi

  # --- Jobs dependientes ---
  build:
    name: Build
    needs: [lint-and-prepare]
    runs-on: ubuntu-latest
    strategy:
      matrix:
        go-version: ['1.23', '1.24']
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go ${{ matrix.go-version }}
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}
          cache: true

      - name: Get dependencies
        run: go mod download

      - name: Generate GraphQL code
        run: go run ./cmd/generate

      # Aplicar parches al código generado
      - name: Fix GraphQL Generated Code
        run: |
          GENERATED_FILE=internal/adapters/gql/generated/generated.go
          if [ -f "$GENERATED_FILE" ]; then
            echo "Aplicando parches al código generado..."
            # 1. Cambiar la importación de sync/atomic
            sed -i 's/"sync\/atomic"/"sync\/atomic\/v2"/g' "$GENERATED_FILE"
            # 2. Corregir referencias a DisableIntrospection
            sed -i 's/if ec.DisableIntrospection {/if ec.OperationContext.DisableIntrospection {/g' "$GENERATED_FILE"
            # 3. Corregir referencias a Error y Recover
            sed -i 's/ec.Error(ctx, ec.Recover(ctx, r))/graphql.AddError(ctx, ec.Recover(ctx, r))/g' "$GENERATED_FILE"
            sed -i 's/ec.Error(ctx, err)/graphql.AddError(ctx, err)/g' "$GENERATED_FILE"
            sed -i 's/ec.Errorf(ctx, "must not be null")/graphql.AddError(ctx, fmt.Errorf("must not be null"))/g' "$GENERATED_FILE"
            # 4. Corregir referencias a ResolverMiddleware
            sed -i 's/resTmp, err := ec.ResolverMiddleware(ctx, func(rctx context.Context) (any, error) {/resTmp, err := ec.OperationContext.ResolverMiddleware(ctx, func(rctx context.Context) (any, error) {/g' "$GENERATED_FILE"
            echo "Parches aplicados correctamente."
          else
            echo "Error: No se encontró el archivo generado en $GENERATED_FILE"
            exit 1
          fi

      - name: Build application
        run: go build -v ./cmd/api

  unit-tests:
    name: Unit Tests
    needs: [lint-and-prepare]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache: true

      - name: Get dependencies
        run: go mod download

      - name: Generate GraphQL code
        run: go run ./cmd/generate

      # Aplicar parches al código generado
      - name: Fix GraphQL Generated Code
        run: |
          GENERATED_FILE=internal/adapters/gql/generated/generated.go
          if [ -f "$GENERATED_FILE" ]; then
            echo "Aplicando parches al código generado..."
            # 1. Cambiar la importación de sync/atomic
            sed -i 's/"sync\/atomic"/"sync\/atomic\/v2"/g' "$GENERATED_FILE"
            # 2. Corregir referencias a DisableIntrospection
            sed -i 's/if ec.DisableIntrospection {/if ec.OperationContext.DisableIntrospection {/g' "$GENERATED_FILE"
            # 3. Corregir referencias a Error y Recover
            sed -i 's/ec.Error(ctx, ec.Recover(ctx, r))/graphql.AddError(ctx, ec.Recover(ctx, r))/g' "$GENERATED_FILE"
            sed -i 's/ec.Error(ctx, err)/graphql.AddError(ctx, err)/g' "$GENERATED_FILE"
            sed -i 's/ec.Errorf(ctx, "must not be null")/graphql.AddError(ctx, fmt.Errorf("must not be null"))/g' "$GENERATED_FILE"
            # 4. Corregir referencias a ResolverMiddleware
            sed -i 's/resTmp, err := ec.ResolverMiddleware(ctx, func(rctx context.Context) (any, error) {/resTmp, err := ec.OperationContext.ResolverMiddleware(ctx, func(rctx context.Context) (any, error) {/g' "$GENERATED_FILE"
            echo "Parches aplicados correctamente."
          else
            echo "Error: No se encontró el archivo generado en $GENERATED_FILE"
            exit 1
          fi

      - name: Run unit tests
        run: go test -v -race -coverprofile=coverage.txt -covermode=atomic ./internal/... ./pkg/...

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          file: ./coverage.txt
          flags: unittests
          fail_ci_if_error: true

  integration-tests:
    name: Integration Tests
    needs: [lint-and-prepare]
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: asam_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache: true

      - name: Get dependencies
        run: go mod download

      - name: Generate GraphQL code
        run: go run ./cmd/generate

      # Aplicar parches al código generado
      - name: Fix GraphQL Generated Code
        run: |
          GENERATED_FILE=internal/adapters/gql/generated/generated.go
          if [ -f "$GENERATED_FILE" ]; then
            echo "Aplicando parches al código generado..."
            # 1. Cambiar la importación de sync/atomic
            sed -i 's/"sync\/atomic"/"sync\/atomic\/v2"/g' "$GENERATED_FILE"
            # 2. Corregir referencias a DisableIntrospection
            sed -i 's/if ec.DisableIntrospection {/if ec.OperationContext.DisableIntrospection {/g' "$GENERATED_FILE"
            # 3. Corregir referencias a Error y Recover
            sed -i 's/ec.Error(ctx, ec.Recover(ctx, r))/graphql.AddError(ctx, ec.Recover(ctx, r))/g' "$GENERATED_FILE"
            sed -i 's/ec.Error(ctx, err)/graphql.AddError(ctx, err)/g' "$GENERATED_FILE"
            sed -i 's/ec.Errorf(ctx, "must not be null")/graphql.AddError(ctx, fmt.Errorf("must not be null"))/g' "$GENERATED_FILE"
            # 4. Corregir referencias a ResolverMiddleware
            sed -i 's/resTmp, err := ec.ResolverMiddleware(ctx, func(rctx context.Context) (any, error) {/resTmp, err := ec.OperationContext.ResolverMiddleware(ctx, func(rctx context.Context) (any, error) {/g' "$GENERATED_FILE"
            echo "Parches aplicados correctamente."
          else
            echo "Error: No se encontró el archivo generado en $GENERATED_FILE"
            exit 1
          fi

      - name: Setup test environment
        run: |
          cp .env.test .env
          go run cmd/migrate/main.go -env local -cmd up
        env:
          DB_HOST: localhost
          DB_PORT: 5432
          DB_USER: postgres
          DB_PASSWORD: postgres
          DB_NAME: asam_test
          DB_SSL_MODE: disable

      - name: Run integration tests
        run: go test -v -tags=integration ./test/integration/...
        env:
          DB_HOST: localhost
          DB_PORT: 5432
          DB_USER: postgres
          DB_PASSWORD: postgres
          DB_NAME: asam_test
          DB_SSL_MODE: disable

  code-quality:
    name: Code Quality Analysis
    needs: [lint-and-prepare]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache: true

      - name: Download Go modules (optional for static analysis, but safe)
        run: go mod download

      - name: Generate GraphQL code
        run: go run ./cmd/generate

      # Aplicar parches al código generado
      - name: Fix GraphQL Generated Code
        run: |
          GENERATED_FILE=internal/adapters/gql/generated/generated.go
          if [ -f "$GENERATED_FILE" ]; then
            echo "Aplicando parches al código generado..."
            # 1. Cambiar la importación de sync/atomic
            sed -i 's/"sync\/atomic"/"sync\/atomic\/v2"/g' "$GENERATED_FILE"
            # 2. Corregir referencias a DisableIntrospection
            sed -i 's/if ec.DisableIntrospection {/if ec.OperationContext.DisableIntrospection {/g' "$GENERATED_FILE"
            # 3. Corregir referencias a Error y Recover
            sed -i 's/ec.Error(ctx, ec.Recover(ctx, r))/graphql.AddError(ctx, ec.Recover(ctx, r))/g' "$GENERATED_FILE"
            sed -i 's/ec.Error(ctx, err)/graphql.AddError(ctx, err)/g' "$GENERATED_FILE"
            sed -i 's/ec.Errorf(ctx, "must not be null")/graphql.AddError(ctx, fmt.Errorf("must not be null"))/g' "$GENERATED_FILE"
            # 4. Corregir referencias a ResolverMiddleware
            sed -i 's/resTmp, err := ec.ResolverMiddleware(ctx, func(rctx context.Context) (any, error) {/resTmp, err := ec.OperationContext.ResolverMiddleware(ctx, func(rctx context.Context) (any, error) {/g' "$GENERATED_FILE"
            echo "Parches aplicados correctamente."
          else
            echo "Error: No se encontró el archivo generado en $GENERATED_FILE"
            exit 1
          fi

      - name: Run go vet
        run: go vet ./...

      - name: Check cyclomatic complexity
        run: |
          go install github.com/fzipp/gocyclo/cmd/gocyclo@latest
          gocyclo -over 15 . || true

      - name: Generate coverage report (consolidated)
        run: go test -coverprofile=coverage.out ./...

      - name: Check coverage percentage
        run: |
          go tool cover -func=coverage.out
          COVERAGE=$(go tool cover -func=coverage.out | grep total | awk '{print $3}' | sed 's/%//')
          echo "Current total coverage: $COVERAGE%"
          if (( $(echo "$COVERAGE < 70.0" | bc -l) )); then
            echo "Error: Code coverage is below 70% ($COVERAGE%)"
            exit 1
          fi
          echo "Code coverage is sufficient ($COVERAGE%)."

  validate-commits:
    name: Validate Commit Messages
    needs: [lint-and-prepare]
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate Conventional Commits
        uses: wagoid/commitlint-github-action@v6
