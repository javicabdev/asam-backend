name: Backend CI Pipeline

on:
  push:
    branches: [ main, develop ]
    paths-ignore:
      - '**/*.md'
  pull_request:
    branches: [ main, develop ]
    paths-ignore:
      - '**/*.md'

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24' # Asegúrate que coincida con tu go.mod y toolchain
          cache: false # Mantenemos caché deshabilitada para diagnóstico

      # 1. Descargar dependencias iniciales (necesarias para instalar/ejecutar herramientas)
      - name: Download Go modules (Initial)
        run: go mod download

      # 2. Instalar la versión EXACTA de gqlgen de go.mod
      #    Reemplaza 'github.com/99designs/gqlgen' con la ruta real si es diferente
      #    Reemplaza 'v0.17.73' con la versión exacta de tu go.mod si es diferente
      - name: Install correct gqlgen version
        run: go install github.com/99designs/gqlgen@v0.17.73

      # 3. Generar el código usando la versión instalada explícitamente
      #    Asegúrate que $(go env GOPATH)/bin esté en el PATH (setup-go usualmente lo hace)
      #    Si tu comando es `go run ./cmd/generate`, asegúrate que ese script use `gqlgen` del PATH.
      #    Alternativamente, si cmd/generate es simple, puedes invocar gqlgen directamente:
      - name: Generate GraphQL code (using installed gqlgen)
        run: gqlgen generate # O usa 'go run ./cmd/generate' si ese script invoca 'gqlgen' del PATH

      # 4. Ordenar dependencias DESPUÉS de generar
      - name: Tidy Go modules
        run: go mod tidy

      # 5. Verificar si go.mod o go.sum cambiaron después de tidy
      #    Si cambian, significa que el código generado o las dependencias no estaban sincronizados.
      #    Deberías ejecutar `go mod tidy` localmente y comitear los cambios.
      - name: Check for module changes after tidy
        run: |
          git diff --exit-code -- go.mod go.sum || \
            (echo "::error::go.mod or go.sum changed after 'go mod tidy'. Please run 'go mod tidy' locally and commit the changes." && exit 1)

      # 6. Descargar *todas* las dependencias finales (probablemente redundante si tidy no cambió nada)
      - name: Download Go modules (Final)
        run: go mod download

      # 7. Verificar estado (Opcional, para depuración)
      - name: Verify Go modules state and environment
        run: |
          echo "--- go version ---"
          go version
          echo "--- go env ---"
          go env
          echo "--- go list -m all ---"
          go list -m all
          echo "--- Listing GOPATH/pkg/mod ---"
          ls -lR $(go env GOPATH)/pkg/mod || echo "GOPATH/pkg/mod not found or error listing."

      # 8. Instalar y ejecutar el Linter (Enfocado en typecheck)
      - name: Install golangci-lint
        run: |
          curl -sSfL https://raw.githubusercontent.com/golangci/golangci-lint/master/install.sh | sh -s -- -b $(go env GOPATH)/bin v1.58.0

      - name: Run golangci-lint (typecheck only)
        # Ejecutamos solo typecheck para aislar los errores 'undefined'
        run: golangci-lint run -v --disable-all -E typecheck ./... --timeout=5m

      # --- Pasos de formato (pueden ejecutarse incluso si el lint falla) ---
      - name: Verify gofmt
        if: always() # Ejecutar incluso si pasos anteriores fallan
        run: |
          OUTPUT=$(gofmt -s -l .)
          if [ -n "$OUTPUT" ]; then
            echo "::warning::The following files are not formatted with gofmt:"
            echo "$OUTPUT"
            # Considera no fallar aquí para ver los errores de lint primero
            # exit 1
          else
            echo "All files are correctly formatted with gofmt."
          fi

      - name: Validate imports (goimports)
        if: always() # Ejecutar incluso si pasos anteriores fallan
        run: |
          go install golang.org/x/tools/cmd/goimports@latest
          OUTPUT=$(goimports -l .)
          if [ -n "$OUTPUT" ]; then
            echo "::warning::The following files have import formatting issues:"
            echo "$OUTPUT"
            # Considera no fallar aquí para ver los errores de lint primero
            # exit 1
          else
            echo "All imports are correctly formatted."
          fi

  # --- Resto de los jobs (build, unit-tests, etc.) ---
  # Asegúrate de que el orden (generate -> build/test) se mantenga aquí también
  build:
    name: Build
    runs-on: ubuntu-latest
    strategy:
      matrix:
        go-version: ['1.23', '1.24']
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go ${{ matrix.go-version }}
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}
          cache: true

      - name: Get dependencies
        run: go mod download

      - name: Install correct gqlgen version # Añadido por consistencia
        run: go install github.com/99designs/gqlgen@v0.17.73

      - name: Generate GraphQL code # Ejecutar ANTES de build
        run: gqlgen generate # O usa 'go run ./cmd/generate'

      - name: Build application
        run: go build -v ./cmd/api

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: [lint, build]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache: true

      - name: Get dependencies
        run: go mod download

      - name: Install correct gqlgen version # Añadido por consistencia
        run: go install github.com/99designs/gqlgen@v0.17.73

      - name: Generate GraphQL code # Ejecutar ANTES de test
        run: gqlgen generate # O usa 'go run ./cmd/generate'

      - name: Run unit tests
        run: go test -v -race -coverprofile=coverage.txt -covermode=atomic ./internal/... ./pkg/...

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.txt
          flags: unittests
          fail_ci_if_error: true

  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: [lint, build]
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: asam_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache: true

      - name: Get dependencies
        run: go mod download

      - name: Install correct gqlgen version # Añadido por consistencia
        run: go install github.com/99designs/gqlgen@v0.17.73

      - name: Generate GraphQL code # Ejecutar ANTES de migrar/testear
        run: gqlgen generate # O usa 'go run ./cmd/generate'

      - name: Setup test environment
        run: |
          cp .env.test .env
          go run cmd/migrate/main.go -env local -cmd up
        env:
          DB_HOST: localhost
          DB_PORT: 5432
          DB_USER: postgres
          DB_PASSWORD: postgres
          DB_NAME: asam_test
          DB_SSL_MODE: disable

      - name: Run integration tests
        run: go test -v -tags=integration ./test/integration/...
        env:
          DB_HOST: localhost
          DB_PORT: 5432
          DB_USER: postgres
          DB_PASSWORD: postgres
          DB_NAME: asam_test
          DB_SSL_MODE: disable

  code-quality:
    name: Code Quality Analysis
    runs-on: ubuntu-latest
    needs: [unit-tests, integration-tests]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache: true

      - name: Download Go modules (optional for static analysis, but safe)
        run: go mod download

      - name: Install correct gqlgen version # Añadido por consistencia
        run: go install github.com/99designs/gqlgen@v0.17.73

      - name: Generate GraphQL code # Ejecutar ANTES de analizar
        run: gqlgen generate # O usa 'go run ./cmd/generate'

      - name: Run go vet
        run: go vet ./...

      - name: Check cyclomatic complexity
        run: |
          go install github.com/fzipp/gocyclo/cmd/gocyclo@latest
          gocyclo -over 15 . || true

      - name: Generate coverage report (consolidated)
        run: go test -coverprofile=coverage.out ./...

      - name: Check coverage percentage
        run: |
          go tool cover -func=coverage.out
          COVERAGE=$(go tool cover -func=coverage.out | grep total | awk '{print $3}' | sed 's/%//')
          echo "Current total coverage: $COVERAGE%"
          if (( $(echo "$COVERAGE < 70.0" | bc -l) )); then
            echo "Error: Code coverage is below 70% ($COVERAGE%)"
            exit 1
          fi
          echo "Code coverage is sufficient ($COVERAGE%)."

  validate-commits:
    name: Validate Commit Messages
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate Conventional Commits
        uses: wagoid/commitlint-github-action@v5

