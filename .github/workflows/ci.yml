name: Backend CI Pipeline

on:
  push:
    branches: [ main, develop ]
    paths-ignore:
      - '**/*.md'
  pull_request:
    branches: [ main, develop ]
    paths-ignore:
      - '**/*.md'

jobs:
  lint-and-prepare:
    name: Lint and Prepare
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache: false # Mantenemos caché deshabilitada para diagnóstico

      # 1. Generar código
      - name: Generate GraphQL code
        run: go run ./cmd/generate

      # 2. Ordenar dependencias
      - name: Tidy Go modules
        run: go mod tidy

      # 3. Descargar dependencias
      - name: Download Go modules
        run: go mod download

      # 4. Verificar compilación estándar
      - name: Verify Go Build
        run: go build ./...

      # 5. Verificar compilación de tests estándar
      - name: Verify Go Test Compilation
        run: go test ./...

      # --- NUEVO PASO DE DIAGNÓSTICO ---
      # 6. Intentar construir 'sync/atomic' explícitamente
      - name: Verify sync/atomic build
        run: go build sync/atomic

      # 7. Verificar estado (Opcional)
      - name: Verify Go modules state and environment
        run: |
          echo "--- go version ---"
          go version
          echo "--- go env ---"
          go env
          echo "--- go list -m all ---"
          go list -m all
          echo "--- Listing GOPATH/pkg/mod ---"
          ls -lR $(go env GOPATH)/pkg/mod || echo "GOPATH/pkg/mod not found or error listing."

      # 8. Instalar y ejecutar el Linter (con --skip-cache)
      - name: Install golangci-lint
        run: |
          curl -sSfL https://raw.githubusercontent.com/golangci/golangci-lint/master/install.sh | sh -s -- -b $(go env GOPATH)/bin v1.58.0

      - name: Run golangci-lint (typecheck only, skip cache)
        # CORRECCIÓN: Añadido --skip-cache
        run: golangci-lint run -v -E typecheck ./... --timeout=5m --skip-cache

      # --- Resto de verificaciones (Formato) ---
      - name: Verify gofmt
        if: always()
        run: |
          OUTPUT=$(gofmt -s -l .)
          if [ -n "$OUTPUT" ]; then
            echo "::warning::The following files are not formatted with gofmt:"
            echo "$OUTPUT"
          else
            echo "All files are correctly formatted with gofmt."
          fi

      - name: Validate imports (goimports)
        if: always()
        run: |
          go install golang.org/x/tools/cmd/goimports@latest
          OUTPUT=$(goimports -l .)
          if [ -n "$OUTPUT" ]; then
            echo "::warning::The following files have import formatting issues:"
            echo "$OUTPUT"
          else
            echo "All imports are correctly formatted."
          fi

  # --- Jobs dependientes ---
  # (build, unit-tests, integration-tests, code-quality, validate-commits)
  # Se mantienen igual que en la versión anterior (ci_yml_corrected_v5)
  # ... (copiar los jobs restantes aquí) ...

  build:
    name: Build
    needs: [lint-and-prepare] # Depende del job renombrado
    runs-on: ubuntu-latest
    strategy:
      matrix:
        go-version: ['1.23', '1.24']
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go ${{ matrix.go-version }}
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}
          cache: true

      - name: Get dependencies
        run: go mod download

      - name: Generate GraphQL code
        run: go run ./cmd/generate

      - name: Build application
        run: go build -v ./cmd/api

  unit-tests:
    name: Unit Tests
    needs: [lint-and-prepare] # Depende del job renombrado
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache: true

      - name: Get dependencies
        run: go mod download

      - name: Generate GraphQL code
        run: go run ./cmd/generate

      - name: Run unit tests
        run: go test -v -race -coverprofile=coverage.txt -covermode=atomic ./internal/... ./pkg/...

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.txt
          flags: unittests
          fail_ci_if_error: true

  integration-tests:
    name: Integration Tests
    needs: [lint-and-prepare] # Depende del job renombrado
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: asam_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache: true

      - name: Get dependencies
        run: go mod download

      - name: Generate GraphQL code
        run: go run ./cmd/generate

      - name: Setup test environment
        run: |
          cp .env.test .env
          go run cmd/migrate/main.go -env local -cmd up
        env:
          DB_HOST: localhost
          DB_PORT: 5432
          DB_USER: postgres
          DB_PASSWORD: postgres
          DB_NAME: asam_test
          DB_SSL_MODE: disable

      - name: Run integration tests
        run: go test -v -tags=integration ./test/integration/...
        env:
          DB_HOST: localhost
          DB_PORT: 5432
          DB_USER: postgres
          DB_PASSWORD: postgres
          DB_NAME: asam_test
          DB_SSL_MODE: disable

  code-quality:
    name: Code Quality Analysis
    needs: [lint-and-prepare] # Depende del job renombrado
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache: true

      - name: Download Go modules (optional for static analysis, but safe)
        run: go mod download

      - name: Generate GraphQL code
        run: go run ./cmd/generate

      - name: Run go vet
        run: go vet ./...

      - name: Check cyclomatic complexity
        run: |
          go install github.com/fzipp/gocyclo/cmd/gocyclo@latest
          gocyclo -over 15 . || true

      - name: Generate coverage report (consolidated)
        run: go test -coverprofile=coverage.out ./...

      - name: Check coverage percentage
        run: |
          go tool cover -func=coverage.out
          COVERAGE=$(go tool cover -func=coverage.out | grep total | awk '{print $3}' | sed 's/%//')
          echo "Current total coverage: $COVERAGE%"
          if (( $(echo "$COVERAGE < 70.0" | bc -l) )); then
            echo "Error: Code coverage is below 70% ($COVERAGE%)"
            exit 1
          fi
          echo "Code coverage is sufficient ($COVERAGE%)."

  validate-commits:
    name: Validate Commit Messages
    needs: [lint-and-prepare] # Depende del job renombrado
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate Conventional Commits
        uses: wagoid/commitlint-github-action@v5

