name: Backend CI Pipeline

on:
  push:
    branches: [ main, develop ]
    paths-ignore:
      - '**/*.md'
  pull_request:
    branches: [ main, develop ]
    paths-ignore:
      - '**/*.md'

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24' # Asegúrate que coincida con tu go.mod y toolchain
          cache: true # Re-habilitar caché

      # --- NUEVO ORDEN ---
      # 1. Generar el código GraphQL (u otro código generado) PRIMERO
      #    (Necesita las dependencias para 'cmd/generate' - asumimos que 'go mod download' implícito o la caché las proveen)
      #    Si este paso falla por dependencias, podríamos necesitar un 'go mod download' *antes* de este.
      - name: Generate GraphQL code
        run: go run ./cmd/generate

      # 2. Ordenar dependencias DESPUÉS de generar (para que vea los nuevos imports)
      - name: Tidy Go modules
        run: go mod tidy

      # 3. Descargar *todas* las dependencias requeridas por el go.mod final
      - name: Download Go modules
        run: go mod download # Eliminado el flag -v inválido

      # 4. Verificar estado (Opcional, para depuración)
      - name: Verify Go modules state and environment
        run: |
          echo "--- go version ---"
          go version
          echo "--- go env ---"
          go env
          echo "--- go list -m all ---"
          go list -m all
          echo "--- Listing GOPATH/pkg/mod ---"
          ls -lR $(go env GOPATH)/pkg/mod || echo "GOPATH/pkg/mod not found or error listing."

      # 5. Instalar y ejecutar el Linter (Ahora debería encontrar all)
      - name: Install golangci-lint
        run: |
          curl -sSfL https://raw.githubusercontent.com/golangci/golangci-lint/master/install.sh | sh -s -- -b $(go env GOPATH)/bin v1.58.0

      - name: Run golangci-lint
        # El flag -v aquí es para golangci-lint, no para go mod download
        run: golangci-lint run -v ./... --timeout=5m

      # --- Resto de verificaciones ---
      - name: Verify gofmt
        run: |
          OUTPUT=$(gofmt -s -l .)
          if [ -n "$OUTPUT" ]; then
            echo "The following files are not formatted with gofmt:"
            echo "$OUTPUT"
            exit 1
          fi
          echo "All files are correctly formatted with gofmt."

      - name: Validate imports (goimports)
        run: |
          go install golang.org/x/tools/cmd/goimports@latest
          OUTPUT=$(goimports -l .)
          if [ -n "$OUTPUT" ]; then
            echo "The following files have import formatting issues:"
            echo "$OUTPUT"
            exit 1
          fi
          echo "All imports are correctly formatted."

  build:
    name: Build
    runs-on: ubuntu-latest
    strategy:
      matrix:
        go-version: ['1.23', '1.24']
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go ${{ matrix.go-version }}
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}
          cache: true

      # Orden corregido también aquí: generar ANTES de compilar
      - name: Get dependencies
        run: go mod download

      - name: Generate GraphQL code
        run: go run ./cmd/generate

      - name: Build application
        run: go build -v ./cmd/api

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: [lint, build]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache: true

      # Orden corregido: generar ANTES de testear
      - name: Get dependencies
        run: go mod download

      - name: Generate GraphQL code
        run: go run ./cmd/generate

      - name: Run unit tests
        run: go test -v -race -coverprofile=coverage.txt -covermode=atomic ./internal/... ./pkg/...

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.txt
          flags: unittests
          fail_ci_if_error: true

  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: [lint, build]
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: asam_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache: true

      # Orden corregido: generar ANTES de migrar/testear
      - name: Get dependencies
        run: go mod download

      - name: Generate GraphQL code
        run: go run ./cmd/generate

      - name: Setup test environment
        run: |
          cp .env.test .env
          go run cmd/migrate/main.go -env local -cmd up
        env:
          DB_HOST: localhost
          DB_PORT: 5432
          DB_USER: postgres
          DB_PASSWORD: postgres
          DB_NAME: asam_test
          DB_SSL_MODE: disable

      - name: Run integration tests
        run: go test -v -tags=integration ./test/integration/...
        env:
          DB_HOST: localhost
          DB_PORT: 5432
          DB_USER: postgres
          DB_PASSWORD: postgres
          DB_NAME: asam_test
          DB_SSL_MODE: disable

  code-quality:
    name: Code Quality Analysis
    runs-on: ubuntu-latest
    needs: [unit-tests, integration-tests]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache: true

      # Orden corregido: generar ANTES de analizar
      - name: Download Go modules (optional for static analysis, but safe)
        run: go mod download

      - name: Generate GraphQL code
        run: go run ./cmd/generate

      - name: Run go vet
        run: go vet ./...

      - name: Check cyclomatic complexity
        run: |
          go install github.com/fzipp/gocyclo/cmd/gocyclo@latest
          gocyclo -over 15 . || true

      - name: Generate coverage report (consolidated)
        run: go test -coverprofile=coverage.out ./...

      - name: Check coverage percentage
        run: |
          go tool cover -func=coverage.out
          COVERAGE=$(go tool cover -func=coverage.out | grep total | awk '{print $3}' | sed 's/%//')
          echo "Current total coverage: $COVERAGE%"
          if (( $(echo "$COVERAGE < 70.0" | bc -l) )); then
            echo "Error: Code coverage is below 70% ($COVERAGE%)"
            exit 1
          fi
          echo "Code coverage is sufficient ($COVERAGE%)."

  validate-commits:
    name: Validate Commit Messages
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate Conventional Commits
        uses: wagoid/commitlint-github-action@v5

