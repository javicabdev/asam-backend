name: Continuous Integration

on:
  push:
    branches: [ main ]
    paths-ignore:
      - '**/*.md'
      - '.gitignore'
      - 'LICENSE'
  pull_request:
    branches: [ main ]

env:
  GO_VERSION: '1.24'  # Última versión estable de Go
  POSTGRES_USER: postgres
  POSTGRES_PASSWORD: postgres
  POSTGRES_DB: asam_test
  POSTGRES_PORT: "5432"
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  SERVICE_NAME: asam-backend

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Para obtener el historial para análisis

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Verify dependencies
        run: |
          go mod download
          go mod verify

      - name: Install gqlgen
        run: go install github.com/99designs/gqlgen@v0.17.73

      - name: Generate GraphQL code
        run: |
          echo "Generating GraphQL code..."
          gqlgen generate

      - name: Install and run golangci-lint
        uses: golangci/golangci-lint-action@v8
        with:
          version: v2.1.6
          args: --timeout=5m

  test:
    name: Test
    needs: lint
    runs-on: ubuntu-latest
    timeout-minutes: 15
    services:
      postgres:
        image: postgres:16-alpine  # Usar alpine para imagen más ligera
        env:
          POSTGRES_USER: ${{ env.POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ env.POSTGRES_PASSWORD }}
          POSTGRES_DB: ${{ env.POSTGRES_DB }}
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Get dependencies
        run: |
          go mod download
          go mod verify

      - name: Install gqlgen
        run: go install github.com/99designs/gqlgen@v0.17.73

      - name: Generate GraphQL code
        run: |
          echo "Generating GraphQL code..."
          gqlgen generate

      - name: Run unit tests with coverage
        run: |
          go test -v -race -coverprofile=coverage.txt -covermode=atomic -coverpkg=./internal/... ./test/internal/...
          go tool cover -func=coverage.txt
        env:
          JWT_ACCESS_SECRET: "test-access-secret-for-unit-tests"
          JWT_REFRESH_SECRET: "test-refresh-secret-for-unit-tests"
          CGO_ENABLED: "1"
          DB_HOST: "testhost-unit"
          DB_PORT: "1234"
          DB_USER: "testuser-unit"
          DB_PASSWORD: "testpassword-unit"
          DB_NAME: "testdb-unit"
          DB_SSL_MODE: "disable"
          ENVIRONMENT: "test_unit"

      - name: Upload coverage to Codecov (opcional)
        uses: codecov/codecov-action@v3
        with:
          files: ./coverage.txt
          fail_ci_if_error: false

      - name: Setup test environment for integration tests
        run: |
          cp .env.test.example .env
          echo "DB_SSL_MODE=disable" >> .env
          echo "Waiting for PostgreSQL to be ready..."
          sleep 10
          go run cmd/migrate/main.go -cmd up
        env:
          CI: "true"
          DB_HOST: localhost
          DB_PORT: ${{ env.POSTGRES_PORT }}
          DB_USER: ${{ env.POSTGRES_USER }}
          DB_PASSWORD: ${{ env.POSTGRES_PASSWORD }}
          DB_NAME: ${{ env.POSTGRES_DB }}
          DB_SSL_MODE: "disable"

      - name: Run integration tests
        run: go test -v -tags=integration -timeout 5m ./test/integration/...
        env:
          # Se usa localhost también aquí para asegurar la conexión
          DB_HOST: localhost
          DB_PORT: ${{ env.POSTGRES_PORT }}
          DB_USER: ${{ env.POSTGRES_USER }}
          DB_PASSWORD: ${{ env.POSTGRES_PASSWORD }}
          DB_NAME: ${{ env.POSTGRES_DB }}
          DB_SSL_MODE: "disable"
          JWT_ACCESS_SECRET: "test-access-secret-for-ci"
          JWT_REFRESH_SECRET: "test-refresh-secret-for-ci"
          ENVIRONMENT: "test"
          CI: "true"

  build:
    name: Build and Push Docker Image
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Google Cloud
        run: |
          gcloud auth configure-docker --quiet

      - name: Build and push image
        run: |
          # Usar el SHA del commit como tag principal
          COMMIT_SHA=${{ github.sha }}
          SHORT_SHA=$(echo $COMMIT_SHA | cut -c1-7)
          
          # Construir imagen con metadatos
          docker build \
            --build-arg VERSION=$SHORT_SHA \
            --build-arg COMMIT=$COMMIT_SHA \
            --build-arg BUILD_TIME=$(date -u +"%Y-%m-%dT%H:%M:%SZ") \
            -t gcr.io/${{ env.PROJECT_ID }}/${{ env.SERVICE_NAME }}:$SHORT_SHA \
            -t gcr.io/${{ env.PROJECT_ID }}/${{ env.SERVICE_NAME }}:latest \
            .
          
          # Subir ambas etiquetas
          docker push gcr.io/${{ env.PROJECT_ID }}/${{ env.SERVICE_NAME }}:$SHORT_SHA
          docker push gcr.io/${{ env.PROJECT_ID }}/${{ env.SERVICE_NAME }}:latest
          
          echo "✅ Image pushed successfully:"
          echo "  - gcr.io/${{ env.PROJECT_ID }}/${{ env.SERVICE_NAME }}:$SHORT_SHA"
          echo "  - gcr.io/${{ env.PROJECT_ID }}/${{ env.SERVICE_NAME }}:latest"

      - name: Create build summary
        run: |
          COMMIT_SHA=${{ github.sha }}
          SHORT_SHA=$(echo $COMMIT_SHA | cut -c1-7)
          
          echo "## 🐳 Docker Image Built" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Image Details" >> $GITHUB_STEP_SUMMARY
          echo "- **Registry**: Google Container Registry" >> $GITHUB_STEP_SUMMARY
          echo "- **Repository**: \`gcr.io/${{ env.PROJECT_ID }}/${{ env.SERVICE_NAME }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Tags**:" >> $GITHUB_STEP_SUMMARY
          echo "  - \`$SHORT_SHA\` (commit SHA)" >> $GITHUB_STEP_SUMMARY
          echo "  - \`latest\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Build Info" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit**: [$SHORT_SHA](${{ github.server_url }}/${{ github.repository }}/commit/$COMMIT_SHA)" >> $GITHUB_STEP_SUMMARY
          echo "- **Built at**: $(date -u +%Y-%m-%dT%H:%M:%SZ)" >> $GITHUB_STEP_SUMMARY
          echo "- **Triggered by**: @${{ github.actor }}" >> $GITHUB_STEP_SUMMARY
