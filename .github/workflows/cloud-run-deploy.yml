name: Deploy to Google Cloud Run

on:
  push:
    branches: [ main ]
    paths-ignore:
      - '**/*.md'
  workflow_dispatch:  # Para despliegues manuales

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  SERVICE_NAME: asam-backend
  REGION: europe-west1
  GO_VERSION: '1.24'  # Definido como variable de entorno global
  # Variables para tests
  POSTGRES_USER: postgres
  POSTGRES_PASSWORD: postgres
  POSTGRES_DB: asam_test
  POSTGRES_HOST: localhost
  POSTGRES_PORT: "5432"

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Install dependencies
        run: go mod download

      - name: Generate GraphQL code
        run: go run ./cmd/generate/main.go

      # Paso para instalar y configurar golangci-lint con la versión 2.1.6
      - name: Install and run golangci-lint
        uses: golangci/golangci-lint-action@v8.0.0
        with:
          version: v2.1.6
          args: --timeout=5m

  test:
    name: Test
    needs: lint
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16  # Actualizado a PostgreSQL 16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: asam_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Get dependencies
        run: go mod download

      - name: Generate GraphQL code
        run: go run ./cmd/generate/main.go  # Ruta completa al archivo main.go

      - name: Run unit tests
        run: go test -v -race -coverprofile=coverage.txt -covermode=atomic ./internal/... ./pkg/...

      - name: Setup test environment for integration tests
        run: |
          cp .env.test.example .env
          go run cmd/migrate/main.go -cmd up
        env:
          CI: "true"
          POSTGRES_USER: ${{ env.POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ env.POSTGRES_PASSWORD }}
          POSTGRES_HOST: ${{ env.POSTGRES_HOST }}
          POSTGRES_PORT: ${{ env.POSTGRES_PORT }}
          POSTGRES_DB: ${{ env.POSTGRES_DB }}
          DB_SSL_MODE: "disable"

      - name: Run integration tests
        run: go test -v -tags=integration ./test/integration/...
        env:
          DB_HOST: ${{ env.POSTGRES_HOST }}
          DB_PORT: ${{ env.POSTGRES_PORT }}
          DB_USER: ${{ env.POSTGRES_USER }}
          DB_PASSWORD: ${{ env.POSTGRES_PASSWORD }}
          DB_NAME: ${{ env.POSTGRES_DB }}
          DB_SSL_MODE: "disable"
          JWT_ACCESS_SECRET: "test-access-secret-for-ci"
          JWT_REFRESH_SECRET: "test-refresh-secret-for-ci"
          ENVIRONMENT: "test"
          CI: "true"

  deploy:
    name: Deploy to Cloud Run
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker
        run: |
          # Configurar autenticación para Artifact Registry
          gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      - name: Generate Image Tag
        id: tag
        run: echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      # Construir y publicar imagen Docker en Artifact Registry
      - name: Build and Push Container
        run: |
          # Usar Artifact Registry en lugar de Container Registry
          IMAGE_URL="${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/cloud-run-source-deploy/${{ env.SERVICE_NAME }}:${{ steps.tag.outputs.sha_short }}"
          
          docker build -t $IMAGE_URL .
          docker push $IMAGE_URL
          
          # Guardar la URL de la imagen para el siguiente paso
          echo "IMAGE_URL=$IMAGE_URL" >> $GITHUB_ENV

      - name: Deploy to Cloud Run
        id: deploy
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ env.SERVICE_NAME }}
          region: ${{ env.REGION }}
          image: ${{ env.IMAGE_URL }}
          env_vars: |
            DB_HOST=${{ secrets.AIVEN_DB_HOST }}
            DB_PORT=${{ secrets.AIVEN_DB_PORT }}
            DB_USER=${{ secrets.AIVEN_DB_USER }}
            DB_PASSWORD=${{ secrets.AIVEN_DB_PASSWORD }}
            DB_NAME=${{ secrets.AIVEN_DB_NAME }}
            DB_SSL_MODE=require
            JWT_ACCESS_SECRET=${{ secrets.JWT_ACCESS_SECRET }}
            JWT_REFRESH_SECRET=${{ secrets.JWT_REFRESH_SECRET }}
            ENVIRONMENT=production
            PORT=8080
          flags: >-
            --allow-unauthenticated
            --cpu=1
            --memory=512Mi
            --concurrency=80
            --min-instances=0
            --max-instances=3
            --timeout=60s

      - name: Set up Go for migrate tool
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Download dependencies for migrate tool
        run: go mod download

      - name: Run Database Migrations
        run: |
          go build -o migrate ./cmd/migrate
          ./migrate -cmd up
        env:
          DB_HOST: ${{ secrets.AIVEN_DB_HOST }}
          DB_PORT: ${{ secrets.AIVEN_DB_PORT }}
          DB_USER: ${{ secrets.AIVEN_DB_USER }}
          DB_PASSWORD: ${{ secrets.AIVEN_DB_PASSWORD }}
          DB_NAME: ${{ secrets.AIVEN_DB_NAME }}
          DB_SSL_MODE: require

      - name: Show Service URL
        run: |
          echo "Service URL: ${{ steps.deploy.outputs.url }}"
