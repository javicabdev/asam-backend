name: Deploy to Google Cloud Run

# Este workflow despliega la aplicación a Google Cloud Run usando imágenes pre-construidas
# Las imágenes se construyen automáticamente en el CI cuando se hace push a main
# Puedes desplegar usando:
# - 'latest': la última imagen construida de main
# - SHA corto del commit (ej: 'a1b2c3d'): una versión específica
# - Cualquier otro tag disponible en GCR

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy'
        required: true
        default: 'production'
        type: choice
        options:
          - production
          - staging
      image_tag:
        description: 'Docker image tag to deploy (e.g., latest, a1b2c3d, v1.0.0)'
        required: false
        default: 'latest'
        type: string
      run_migrations:
        description: 'Run database migrations'
        required: false
        default: false
        type: boolean

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  SERVICE_NAME: asam-backend
  REGION: europe-west1
  GO_VERSION: '1.24'

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to Cloud Run
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: production
    steps:
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Determine image to deploy
        id: image
        run: |
          IMAGE_TAG="${{ github.event.inputs.image_tag || 'latest' }}"
          GCR_IMAGE="gcr.io/${{ env.PROJECT_ID }}/${{ env.SERVICE_NAME }}:${IMAGE_TAG}"
          
          echo "Image to deploy: $GCR_IMAGE"
          echo "gcr_image=$GCR_IMAGE" >> $GITHUB_OUTPUT
          echo "tag=$IMAGE_TAG" >> $GITHUB_OUTPUT

      - name: Verify image exists
        run: |
          echo "Verifying image exists in registry..."
          if gcloud container images describe ${{ steps.image.outputs.gcr_image }} > /dev/null 2>&1; then
            echo "✅ Image found: ${{ steps.image.outputs.gcr_image }}"
          else
            echo "❌ Error: Image not found: ${{ steps.image.outputs.gcr_image }}"
            echo "Available tags for this repository:"
            gcloud container images list-tags gcr.io/${{ env.PROJECT_ID }}/${{ env.SERVICE_NAME }} --limit=10 --format="table(tags,timestamp)"
            exit 1
          fi

      - name: Deploy to Cloud Run
        id: deploy
        run: |
          echo "Deploying image: ${{ steps.image.outputs.gcr_image }}"

          gcloud run deploy ${{ env.SERVICE_NAME }} \
            --image="${{ steps.image.outputs.gcr_image }}" \
            --region=${{ env.REGION }} \
            --platform=managed \
            --allow-unauthenticated \
            --set-env-vars="ENVIRONMENT=${{ github.event.inputs.environment }}" \
            --set-env-vars="DB_SSL_MODE=require" \
            --set-env-vars="JWT_ACCESS_TTL=15m" \
            --set-env-vars="JWT_REFRESH_TTL=168h" \
            --set-env-vars="SMTP_SERVER=smtp.gmail.com" \
            --set-env-vars="SMTP_PORT=587" \
            --set-env-vars="SMTP_USE_TLS=true" \
            --set-env-vars="SMTP_FROM_EMAIL=noreply@asam.org" \
            --set-env-vars="RATE_LIMIT_RPS=10" \
            --set-env-vars="RATE_LIMIT_BURST=20" \
            --set-env-vars="LOG_SLOW_QUERIES=true" \
            --set-env-vars="SLOW_QUERY_THRESHOLD=100ms" \
            --set-env-vars="LOG_SLOW_RESOLVERS=true" \
            --set-env-vars="SLOW_RESOLVER_THRESHOLD=100ms" \
            --set-env-vars="GQL_COMPLEXITY_LIMIT=1000" \
            --set-env-vars="GQL_CONCURRENT_RESOLVERS=10" \
            --set-secrets="DB_HOST=db-host:latest" \
            --set-secrets="DB_PORT=db-port:latest" \
            --set-secrets="DB_USER=db-user:latest" \
            --set-secrets="DB_PASSWORD=db-password:latest" \
            --set-secrets="DB_NAME=db-name:latest" \
            --set-secrets="JWT_ACCESS_SECRET=jwt-access-secret:latest" \
            --set-secrets="JWT_REFRESH_SECRET=jwt-refresh-secret:latest" \
            --set-secrets="ADMIN_USER=admin-user:latest" \
            --set-secrets="ADMIN_PASSWORD=admin-password:latest" \
            --set-secrets="SMTP_USER=smtp-user:latest" \
            --set-secrets="SMTP_PASSWORD=smtp-password:latest" \
            --cpu=1 \
            --memory=512Mi \
            --concurrency=80 \
            --min-instances=0 \
            --max-instances=3 \
            --timeout=60s \
            --labels="managed-by=github-actions,image-tag=${IMAGE_TAG},deployed-at=$(date -u +%Y%m%d-%H%M%S)" \
            --quiet

      - name: Get service URL
        id: service
        run: |
          SERVICE_URL=$(gcloud run services describe ${{ env.SERVICE_NAME }} \
            --region=${{ env.REGION }} \
            --format='value(status.url)')
          echo "url=$SERVICE_URL" >> $GITHUB_OUTPUT

      - name: Verify deployment
        run: |
          echo "Testing service at ${{ steps.service.outputs.url }}"
          MAX_ATTEMPTS=10
          SLEEP_TIME=5
          
          for i in $(seq 1 $MAX_ATTEMPTS); do
            if curl -f -s "${{ steps.service.outputs.url }}/health/live" > /dev/null; then
              echo "✅ Health check passed on attempt $i"
              break
            fi
            echo "⏳ Attempt $i/$MAX_ATTEMPTS failed, retrying in ${SLEEP_TIME}s..."
            sleep $SLEEP_TIME
          done
          
          # Final check with detailed output
          echo ""
          echo "Final health check:"
          curl -s "${{ steps.service.outputs.url }}/health" | jq '.' || echo "Failed to get health status"

      - name: Create deployment summary
        run: |
          echo "## 🚀 Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Service Details" >> $GITHUB_STEP_SUMMARY
          echo "- **Service**: \`${{ env.SERVICE_NAME }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Environment**: \`${{ github.event.inputs.environment }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Region**: \`${{ env.REGION }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **URL**: ${{ steps.service.outputs.url }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Docker Image" >> $GITHUB_STEP_SUMMARY
          echo "- **Registry**: Google Container Registry" >> $GITHUB_STEP_SUMMARY
          echo "- **Image**: \`${{ steps.image.outputs.gcr_image }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Tag**: \`${{ steps.image.outputs.tag }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Deployment Info" >> $GITHUB_STEP_SUMMARY
          echo "- **Deployed by**: @${{ github.actor }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Deployed at**: $(date -u +%Y-%m-%dT%H:%M:%SZ)" >> $GITHUB_STEP_SUMMARY
          echo "- **Workflow run**: [#${{ github.run_number }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})" >> $GITHUB_STEP_SUMMARY

  migrate:
    name: Run Database Migrations
    if: github.event.inputs.run_migrations == 'true'
    needs: deploy
    runs-on: ubuntu-latest
    environment: production-migrations
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Get database secrets
        run: |
          echo "::add-mask::$(gcloud secrets versions access latest --secret=db-host)"
          echo "::add-mask::$(gcloud secrets versions access latest --secret=db-password)"
          echo "DB_HOST=$(gcloud secrets versions access latest --secret=db-host)" >> $GITHUB_ENV
          echo "DB_PORT=$(gcloud secrets versions access latest --secret=db-port)" >> $GITHUB_ENV
          echo "DB_USER=$(gcloud secrets versions access latest --secret=db-user)" >> $GITHUB_ENV
          echo "DB_PASSWORD=$(gcloud secrets versions access latest --secret=db-password)" >> $GITHUB_ENV
          echo "DB_NAME=$(gcloud secrets versions access latest --secret=db-name)" >> $GITHUB_ENV

      - name: Run migrations
        run: |
          echo "Running database migrations..."
          go run cmd/migrate/main.go -cmd up
          echo "✅ Migrations completed successfully"
        env:
          CI: "true"
          DB_SSL_MODE: require

      - name: Create migration summary
        if: success()
        run: |
          echo "## ✅ Database Migrations Completed" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Environment**: ${{ github.event.inputs.environment }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Executed at**: $(date -u +%Y-%m-%dT%H:%M:%SZ)" >> $GITHUB_STEP_SUMMARY
          echo "- **Executed by**: @${{ github.actor }}" >> $GITHUB_STEP_SUMMARY
