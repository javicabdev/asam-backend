name: Deploy to Google Cloud Run

on:
  push:
    branches: [ main ]
    paths-ignore:
      - '**/*.md'
  workflow_dispatch:  # Para despliegues manuales

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}  # ID de tu nuevo proyecto en GCP
  SERVICE_NAME: asam-backend
  REGION: europe-west1  # Región de Cloud Run (ajustar según necesidades)

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: asam_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache: true
      
      - name: Get dependencies
        run: go mod download
      
      - name: Run unit tests
        run: go test -v -race -coverprofile=coverage.txt -covermode=atomic ./internal/... ./pkg/...
      
      - name: Setup test environment
        run: |
          cp .env.test .env
          go run cmd/migrate/main.go up
      
      - name: Run integration tests
        run: go test -v -tags=integration ./test/integration/...

  deploy:
    name: Deploy to Cloud Run
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      # Autenticar en Google Cloud
      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}
      
      # Configurar Google Cloud CLI
      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
      
      # Configurar Docker para usar Google Container Registry
      - name: Configure Docker
        run: gcloud auth configure-docker --quiet
      
      # Generar SHA corto para el tag de la imagen
      - name: Generate Image Tag
        id: tag
        run: echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT
      
      # Construir y publicar imagen Docker
      - name: Build and Push Container
        run: |
          docker build -t gcr.io/${{ env.PROJECT_ID }}/${{ env.SERVICE_NAME }}:${{ steps.tag.outputs.sha_short }} .
          docker push gcr.io/${{ env.PROJECT_ID }}/${{ env.SERVICE_NAME }}:${{ steps.tag.outputs.sha_short }}
      
      # Desplegar a Cloud Run
      - name: Deploy to Cloud Run
        id: deploy
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ env.SERVICE_NAME }}
          region: ${{ env.REGION }}
          image: gcr.io/${{ env.PROJECT_ID }}/${{ env.SERVICE_NAME }}:${{ steps.tag.outputs.sha_short }}
          env_vars: DB_HOST=${{ secrets.AIVEN_DB_HOST }},DB_PORT=${{ secrets.AIVEN_DB_PORT }},DB_USER=${{ secrets.AIVEN_DB_USER }},DB_PASSWORD=${{ secrets.AIVEN_DB_PASSWORD }},DB_NAME=${{ secrets.AIVEN_DB_NAME }},DB_SSL_MODE=require,JWT_ACCESS_SECRET=${{ secrets.JWT_ACCESS_SECRET }},JWT_REFRESH_SECRET=${{ secrets.JWT_REFRESH_SECRET }},ENVIRONMENT=production,PORT=8080
          flags: --allow-unauthenticated --cpu=1 --memory=512Mi --concurrency=80 --min-instances=0 --max-instances=3 --timeout=60s
      
      # Ejecutar migraciones de base de datos
      - name: Run Database Migrations
        run: |
          go build -o migrate ./cmd/migrate
          ./migrate up
        env:
          DB_HOST: ${{ secrets.AIVEN_DB_HOST }}
          DB_PORT: ${{ secrets.AIVEN_DB_PORT }}
          DB_USER: ${{ secrets.AIVEN_DB_USER }}
          DB_PASSWORD: ${{ secrets.AIVEN_DB_PASSWORD }}
          DB_NAME: ${{ secrets.AIVEN_DB_NAME }}
          DB_SSL_MODE: require
      
      # Publicar URL del servicio
      - name: Show Service URL
        run: |
          echo "Service URL: ${{ steps.deploy.outputs.url }}"