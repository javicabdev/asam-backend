name: Deploy to Google Cloud Run

on:
  workflow_dispatch:  # Para despliegues manuales
    inputs:
      environment:
        description: 'Environment to deploy to'
        required: true
        default: 'production'
        type: choice
        options:
          - production
          - staging
      run_migrations:
        description: 'Run database migrations'
        required: false
        default: false
        type: boolean

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  SERVICE_NAME: asam-backend
  REGION: europe-west1
  GO_VERSION: '1.24'
  ARTIFACT_REGISTRY: europe-west1-docker.pkg.dev

# Limitar concurrencia para evitar despliegues simultáneos
concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  build-and-push:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    timeout-minutes: 15
    outputs:
      image-url: ${{ steps.image.outputs.url }}
      image-digest: ${{ steps.push.outputs.digest }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker
        run: gcloud auth configure-docker ${{ env.ARTIFACT_REGISTRY }} --quiet

      - name: Generate metadata
        id: meta
        run: |
          echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT
          echo "version=$(date +%Y%m%d)-$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT
          echo "build_time=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> $GITHUB_OUTPUT

      - name: Build and push Docker image
        id: push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.ARTIFACT_REGISTRY }}/${{ env.PROJECT_ID }}/asam-backend/${{ env.SERVICE_NAME }}:${{ steps.meta.outputs.sha_short }}
            ${{ env.ARTIFACT_REGISTRY }}/${{ env.PROJECT_ID }}/asam-backend/${{ env.SERVICE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            VERSION=${{ steps.meta.outputs.version }}
            COMMIT=${{ steps.meta.outputs.sha_short }}
            BUILD_TIME=${{ steps.meta.outputs.build_time }}

      - name: Output image URL
        id: image
        run: |
          IMAGE_URL="${{ env.ARTIFACT_REGISTRY }}/${{ env.PROJECT_ID }}/asam-backend/${{ env.SERVICE_NAME }}:${{ steps.meta.outputs.sha_short }}"
          echo "Generated image URL: $IMAGE_URL"
          echo "url=$IMAGE_URL" >> $GITHUB_OUTPUT

  deploy:
    name: Deploy to Cloud Run
    needs: build-and-push
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Deploy to Cloud Run
        id: deploy
        run: |
          IMAGE_URL="${{ needs.build-and-push.outputs.image-url }}"
          if [ -z "$IMAGE_URL" ]; then
            echo "Warning: image-url is empty, using latest tag"
            IMAGE_URL="${{ env.ARTIFACT_REGISTRY }}/${{ env.PROJECT_ID }}/asam-backend/${{ env.SERVICE_NAME }}:latest"
          fi
          echo "Deploying image: $IMAGE_URL"

          gcloud run deploy ${{ env.SERVICE_NAME }} \
            --image="$IMAGE_URL" \
            --region=${{ env.REGION }} \
            --platform=managed \
            --allow-unauthenticated \
            --set-env-vars="ENVIRONMENT=production" \
            --set-env-vars="DB_SSL_MODE=require" \
            --set-env-vars="JWT_ACCESS_TTL=15m" \
            --set-env-vars="JWT_REFRESH_TTL=168h" \
            --set-env-vars="SMTP_SERVER=smtp.gmail.com" \
            --set-env-vars="SMTP_PORT=587" \
            --set-env-vars="SMTP_USE_TLS=true" \
            --set-env-vars="SMTP_FROM_EMAIL=noreply@asam.org" \
            --set-env-vars="RATE_LIMIT_RPS=10" \
            --set-env-vars="RATE_LIMIT_BURST=20" \
            --set-env-vars="LOG_SLOW_QUERIES=true" \
            --set-env-vars="SLOW_QUERY_THRESHOLD=100ms" \
            --set-env-vars="LOG_SLOW_RESOLVERS=true" \
            --set-env-vars="SLOW_RESOLVER_THRESHOLD=100ms" \
            --set-env-vars="GQL_COMPLEXITY_LIMIT=1000" \
            --set-env-vars="GQL_CONCURRENT_RESOLVERS=10" \
            --set-secrets="DB_HOST=db-host:latest" \
            --set-secrets="DB_PORT=db-port:latest" \
            --set-secrets="DB_USER=db-user:latest" \
            --set-secrets="DB_PASSWORD=db-password:latest" \
            --set-secrets="DB_NAME=db-name:latest" \
            --set-secrets="JWT_ACCESS_SECRET=jwt-access-secret:latest" \
            --set-secrets="JWT_REFRESH_SECRET=jwt-refresh-secret:latest" \
            --set-secrets="ADMIN_USER=admin-user:latest" \
            --set-secrets="ADMIN_PASSWORD=admin-password:latest" \
            --set-secrets="SMTP_USER=smtp-user:latest" \
            --set-secrets="SMTP_PASSWORD=smtp-password:latest" \
            --cpu=1 \
            --memory=512Mi \
            --concurrency=80 \
            --min-instances=0 \
            --max-instances=3 \
            --timeout=60s \
            --labels="managed-by=github-actions,commit-sha=${{ github.sha }},version=${{ needs.build-and-push.outputs.image-url }}" \
            --quiet

      - name: Get service URL
        id: service
        run: |
          SERVICE_URL=$(gcloud run services describe ${{ env.SERVICE_NAME }} \
            --region=${{ env.REGION }} \
            --format='value(status.url)')
          echo "url=$SERVICE_URL" >> $GITHUB_OUTPUT

      - name: Smoke test
        run: |
          echo "Testing service at ${{ steps.service.outputs.url }}"
          for i in {1..5}; do
            if curl -f -s "${{ steps.service.outputs.url }}/health/live"; then
              echo "Health check passed"
              break
            fi
            echo "Attempt $i failed, retrying..."
            sleep 5
          done

      - name: Create deployment summary
        run: |
          echo "## Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "- **Service**: ${{ env.SERVICE_NAME }}" >> $GITHUB_STEP_SUMMARY
          echo "- **URL**: ${{ steps.service.outputs.url }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Image**: ${{ needs.build-and-push.outputs.image-url }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit**: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Deployed at**: $(date -u +%Y-%m-%dT%H:%M:%SZ)" >> $GITHUB_STEP_SUMMARY

  migrate:
    name: Run Database Migrations
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.run_migrations == 'true'
    needs: deploy
    runs-on: ubuntu-latest
    environment: production-migrations
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Get database secrets
        id: secrets
        run: |
          echo "DB_HOST=$(gcloud secrets versions access latest --secret=db-host)" >> $GITHUB_ENV
          echo "DB_PORT=$(gcloud secrets versions access latest --secret=db-port)" >> $GITHUB_ENV
          echo "DB_USER=$(gcloud secrets versions access latest --secret=db-user)" >> $GITHUB_ENV
          echo "DB_PASSWORD=$(gcloud secrets versions access latest --secret=db-password)" >> $GITHUB_ENV
          echo "DB_NAME=$(gcloud secrets versions access latest --secret=db-name)" >> $GITHUB_ENV

      - name: Run migrations
        run: |
          go run cmd/migrate/main.go -cmd up
        env:
          DB_SSL_MODE: require
