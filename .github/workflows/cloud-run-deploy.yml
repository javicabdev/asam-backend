name: Deploy to Google Cloud Run

on:
  push:
    branches: [ main ]
    paths-ignore:
      - '**/*.md'
      - '.gitignore'
      - 'LICENSE'
      - '.github/workflows/ci.yml'
  workflow_dispatch:  # Para despliegues manuales
    inputs:
      environment:
        description: 'Environment to deploy to'
        required: true
        default: 'production'
        type: choice
        options:
          - production
          - staging

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  SERVICE_NAME: asam-backend
  REGION: europe-west1
  GO_VERSION: '1.24'  # Última versión estable de Go
  ARTIFACT_REGISTRY: europe-west1-docker.pkg.dev
  POSTGRES_USER: postgres
  POSTGRES_PASSWORD: postgres
  POSTGRES_DB: asam_test
  POSTGRES_HOST: localhost
  POSTGRES_PORT: "5432"

# Limitar concurrencia para evitar despliegues simultáneos
concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Para obtener el historial para análisis

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Verify dependencies
        run: |
          go mod download
          go mod verify

      - name: Install gqlgen
        run: go install github.com/99designs/gqlgen@v0.17.73

      - name: Generate GraphQL code
        run: |
          echo "Generating GraphQL code..."
          gqlgen generate

      - name: Install and run golangci-lint
        uses: golangci/golangci-lint-action@v8
        with:
          version: v2.1.6  # Última versión de golangci-lint
          args: --timeout=5m

  test:
    name: Test
    needs: lint
    runs-on: ubuntu-latest
    timeout-minutes: 15
    services:
      postgres:
        image: postgres:16-alpine  # Usar alpine para imagen más ligera
        env:
          POSTGRES_USER: ${{ env.POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ env.POSTGRES_PASSWORD }}
          POSTGRES_DB: ${{ env.POSTGRES_DB }}
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Get dependencies
        run: |
          go mod download
          go mod verify

      - name: Install gqlgen
        run: go install github.com/99designs/gqlgen@v0.17.73

      - name: Generate GraphQL code
        run: |
          echo "Generating GraphQL code..."
          gqlgen generate

      - name: Run unit tests with coverage
        run: |
          go test -v -race -coverprofile=coverage.txt -covermode=atomic ./internal/... ./pkg/...
          go tool cover -func=coverage.txt

      - name: Upload coverage to Codecov (opcional)
        uses: codecov/codecov-action@v3
        with:
          files: ./coverage.txt
          fail_ci_if_error: false

      - name: Setup test environment for integration tests
        run: |
          cp .env.test.example .env
          go run cmd/migrate/main.go -cmd up
        env:
          CI: "true"
          DB_HOST: ${{ env.POSTGRES_HOST }}
          DB_PORT: ${{ env.POSTGRES_PORT }}
          DB_USER: ${{ env.POSTGRES_USER }}
          DB_PASSWORD: ${{ env.POSTGRES_PASSWORD }}
          DB_NAME: ${{ env.POSTGRES_DB }}
          DB_SSL_MODE: "disable"

      - name: Run integration tests
        run: go test -v -tags=integration -timeout 5m ./test/integration/...
        env:
          DB_HOST: ${{ env.POSTGRES_HOST }}
          DB_PORT: ${{ env.POSTGRES_PORT }}
          DB_USER: ${{ env.POSTGRES_USER }}
          DB_PASSWORD: ${{ env.POSTGRES_PASSWORD }}
          DB_NAME: ${{ env.POSTGRES_DB }}
          DB_SSL_MODE: "disable"
          JWT_ACCESS_SECRET: "test-access-secret-for-ci"
          JWT_REFRESH_SECRET: "test-refresh-secret-for-ci"
          ENVIRONMENT: "test"
          CI: "true"

  build-and-push:
    name: Build and Push Docker Image
    needs: test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    outputs:
      image-url: ${{ steps.image.outputs.url }}
      image-digest: ${{ steps.push.outputs.digest }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker
        run: gcloud auth configure-docker ${{ env.ARTIFACT_REGISTRY }} --quiet

      - name: Generate metadata
        id: meta
        run: |
          echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT
          echo "version=$(date +%Y%m%d)-$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT
          echo "build_time=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> $GITHUB_OUTPUT

      - name: Build and push Docker image
        id: push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.ARTIFACT_REGISTRY }}/${{ env.PROJECT_ID }}/asam-backend/${{ env.SERVICE_NAME }}:${{ steps.meta.outputs.sha_short }}
            ${{ env.ARTIFACT_REGISTRY }}/${{ env.PROJECT_ID }}/asam-backend/${{ env.SERVICE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            VERSION=${{ steps.meta.outputs.version }}
            COMMIT=${{ steps.meta.outputs.sha_short }}
            BUILD_TIME=${{ steps.meta.outputs.build_time }}

      - name: Output image URL
        id: image
        run: |
          IMAGE_URL="${{ env.ARTIFACT_REGISTRY }}/${{ env.PROJECT_ID }}/asam-backend/${{ env.SERVICE_NAME }}:${{ steps.meta.outputs.sha_short }}"
          echo "Generated image URL: $IMAGE_URL"
          echo "url=$IMAGE_URL" >> $GITHUB_OUTPUT
          echo "image-url=$IMAGE_URL" >> $GITHUB_ENV

  deploy:
    name: Deploy to Cloud Run
    needs: build-and-push
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: production  # Protección de entorno en GitHub
    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Debug outputs
        run: |
          echo "Image URL from previous job: ${{ needs.build-and-push.outputs.image-url }}"
          echo "All outputs: ${{ toJSON(needs.build-and-push.outputs) }}"

      - name: Deploy to Cloud Run
        id: deploy
        run: |
          # Use the output or fallback to latest
          IMAGE_URL="${{ needs.build-and-push.outputs.image-url }}"
          if [ -z "$IMAGE_URL" ]; then
            echo "Warning: image-url is empty, using latest tag"
            IMAGE_URL="${{ env.ARTIFACT_REGISTRY }}/${{ env.PROJECT_ID }}/asam-backend/${{ env.SERVICE_NAME }}:latest"
          fi
          echo "Deploying image: $IMAGE_URL"
          
          gcloud run deploy ${{ env.SERVICE_NAME }} \
            --image="$IMAGE_URL" \
            --region=${{ env.REGION }} \
            --platform=managed \
            --allow-unauthenticated \
            --set-env-vars="DB_HOST=${{ secrets.AIVEN_DB_HOST }}" \
            --set-env-vars="DB_PORT=${{ secrets.AIVEN_DB_PORT }}" \
            --set-env-vars="DB_USER=${{ secrets.AIVEN_DB_USER }}" \
            --set-env-vars="DB_PASSWORD=${{ secrets.AIVEN_DB_PASSWORD }}" \
            --set-env-vars="DB_NAME=${{ secrets.AIVEN_DB_NAME }}" \
            --set-env-vars="DB_SSL_MODE=require" \
            --set-env-vars="JWT_ACCESS_SECRET=${{ secrets.JWT_ACCESS_SECRET }}" \
            --set-env-vars="JWT_REFRESH_SECRET=${{ secrets.JWT_REFRESH_SECRET }}" \
            --set-env-vars="ENVIRONMENT=production" \
            --set-env-vars="ADMIN_USER=${{ secrets.ADMIN_USER }}" \
            --set-env-vars="ADMIN_PASSWORD=${{ secrets.ADMIN_PASSWORD }}" \
            --set-env-vars="SMTP_USER=${{ secrets.SMTP_USER || 'noreply@asam.org' }}" \
            --set-env-vars="SMTP_PASSWORD=${{ secrets.SMTP_PASSWORD || 'temp-smtp-pass' }}" \
            --cpu=1 \
            --memory=512Mi \
            --concurrency=80 \
            --min-instances=0 \
            --max-instances=3 \
            --timeout=60s \
            --labels="managed-by=github-actions,commit-sha=${{ github.sha }},version=${{ needs.build-and-push.outputs.image-url }}" \
            --quiet

      - name: Get service URL
        id: service
        run: |
          SERVICE_URL=$(gcloud run services describe ${{ env.SERVICE_NAME }} \
            --region=${{ env.REGION }} \
            --format='value(status.url)')
          echo "url=$SERVICE_URL" >> $GITHUB_OUTPUT

      - name: Smoke test
        run: |
          echo "Testing service at ${{ steps.service.outputs.url }}"
          for i in {1..5}; do
            if curl -f -s "${{ steps.service.outputs.url }}/health/live"; then
              echo "Health check passed"
              break
            fi
            echo "Attempt $i failed, retrying..."
            sleep 5
          done

      - name: Create deployment summary
        run: |
          echo "## Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "- **Service**: ${{ env.SERVICE_NAME }}" >> $GITHUB_STEP_SUMMARY
          echo "- **URL**: ${{ steps.service.outputs.url }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Image**: ${{ needs.build-and-push.outputs.image-url }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit**: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Deployed at**: $(date -u +%Y-%m-%dT%H:%M:%SZ)" >> $GITHUB_STEP_SUMMARY

  # Job separado para migraciones (ejecutar manualmente cuando sea necesario)
  migrate:
    name: Run Database Migrations
    if: github.event_name == 'workflow_dispatch'
    needs: deploy
    runs-on: ubuntu-latest
    environment: production-migrations  # Entorno separado con aprobación manual
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Run migrations
        run: |
          go run cmd/migrate/main.go -cmd up
        env:
          DB_HOST: ${{ secrets.AIVEN_DB_HOST }}
          DB_PORT: ${{ secrets.AIVEN_DB_PORT }}
          DB_USER: ${{ secrets.AIVEN_DB_USER }}
          DB_PASSWORD: ${{ secrets.AIVEN_DB_PASSWORD }}
          DB_NAME: ${{ secrets.AIVEN_DB_NAME }}
          DB_SSL_MODE: require