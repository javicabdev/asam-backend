name: Release Pipeline

# Este workflow se activa cuando se crea un tag con el formato 'v*.*.*'
# Verifica el código, crea el GitHub Release y construye la imagen Docker oficial
on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write  # Necesario para crear releases
  actions: read    # Necesario para leer los workflows

env:
  GO_VERSION: '1.26'
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  SERVICE_NAME: asam-backend

jobs:
  # Verificar el código antes de crear el release
  verify:
    name: Verify Code
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Install dependencies
        run: go mod download

      - name: Install gqlgen
        run: go install github.com/99designs/gqlgen@v0.17.73

      - name: Generate GraphQL code
        run: |
          echo "Generating GraphQL code..."
          gqlgen generate

      - name: Run golangci-lint
        run: |
          # Install golangci-lint v2.4.0
          curl -sSfL https://raw.githubusercontent.com/golangci/golangci-lint/master/install.sh | sh -s -- -b $(go env GOPATH)/bin v2.4.0
          
          # Run with explicit flags (avoiding config file issues)
          golangci-lint run \
            --enable=errcheck,govet,ineffassign,staticcheck,unused,gosec \
            --skip-dirs=internal/adapters/gql/generated,internal/adapters/gql/model,test,scripts,vendor \
            --timeout=5m \
            ./...

      - name: Run unit tests
        run: go test -v -race ./internal/... ./pkg/...
        env:
          JWT_ACCESS_SECRET: "test-secret"
          JWT_REFRESH_SECRET: "test-secret"
          DB_HOST: "test"
          DB_PORT: "5432"
          DB_USER: "test"
          DB_PASSWORD: "test"
          DB_NAME: "test"

  # Crear release en GitHub y construir Docker
  release-and-docker:
    name: Create Release and Docker Image
    runs-on: ubuntu-latest
    needs: [verify]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract version from tag
        id: get_version
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          echo "Version: $VERSION"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          # Generar timestamp para BUILD_TIME
          echo "build_time=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> $GITHUB_OUTPUT

      # Crear Release en GitHub
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref }}
          name: Release ${{ steps.get_version.outputs.version }}
          draft: false
          prerelease: false
          generate_release_notes: true
          body: |
            ## ASAM Backend ${{ steps.get_version.outputs.version }}
            
            ### 🐳 Docker Image
            ```bash
            docker pull gcr.io/${{ env.PROJECT_ID }}/${{ env.SERVICE_NAME }}:${{ steps.get_version.outputs.version }}
            ```
            
            ### ☁️ Cloud Run Deployment
            This release is ready for deployment to Google Cloud Run.
            
            To deploy this version:
            1. Go to Actions → "Deploy to Google Cloud Run"
            2. Run workflow with image tag: `${{ steps.get_version.outputs.version }}`
            3. Check "Run database migrations" if needed
            
            ### 📝 What's Changed
            See the auto-generated release notes below for details.

      # Autenticar con Google Cloud y construir imagen Docker
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Google Cloud
        run: |
          gcloud auth configure-docker --quiet

      - name: Build and push Docker image to GCR
        run: |
          VERSION=${{ steps.get_version.outputs.version }}
          
          # Construir imagen con metadatos
          docker build \
            --build-arg VERSION=$VERSION \
            --build-arg COMMIT=${{ github.sha }} \
            --build-arg BUILD_TIME=${{ steps.get_version.outputs.build_time }} \
            -t gcr.io/${{ env.PROJECT_ID }}/${{ env.SERVICE_NAME }}:$VERSION \
            -t gcr.io/${{ env.PROJECT_ID }}/${{ env.SERVICE_NAME }}:latest \
            .
          
          # Subir ambas etiquetas
          docker push gcr.io/${{ env.PROJECT_ID }}/${{ env.SERVICE_NAME }}:$VERSION
          docker push gcr.io/${{ env.PROJECT_ID }}/${{ env.SERVICE_NAME }}:latest
          
          echo "✅ Docker image pushed successfully:"
          echo "  - gcr.io/${{ env.PROJECT_ID }}/${{ env.SERVICE_NAME }}:$VERSION"
          echo "  - gcr.io/${{ env.PROJECT_ID }}/${{ env.SERVICE_NAME }}:latest"

      - name: Create deployment instructions
        run: |
          echo "## 🚀 Deployment Instructions" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Docker Image Published to GCR" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`bash" >> $GITHUB_STEP_SUMMARY
          echo "docker pull gcr.io/${{ env.PROJECT_ID }}/${{ env.SERVICE_NAME }}:${{ steps.get_version.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Available Tags" >> $GITHUB_STEP_SUMMARY
          echo "- \`${{ steps.get_version.outputs.version }}\` - This release" >> $GITHUB_STEP_SUMMARY
          echo "- \`latest\` - Updated to this release" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Next Steps" >> $GITHUB_STEP_SUMMARY
          echo "1. Go to [Deploy to Google Cloud Run](https://github.com/${{ github.repository }}/actions/workflows/cloud-run-deploy.yml)" >> $GITHUB_STEP_SUMMARY
          echo "2. Click 'Run workflow'" >> $GITHUB_STEP_SUMMARY
          echo "3. Use image tag: \`${{ steps.get_version.outputs.version }}\`" >> $GITHUB_STEP_SUMMARY
          echo "4. Check 'Run database migrations' if needed" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Version**: ${{ steps.get_version.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "**Commit**: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
