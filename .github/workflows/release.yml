name: Release Pipeline

# Este workflow se activa cuando se crea un tag con el formato 'v*.*.*'
# Compatible con el versionado semántico
on:
  push:
    tags:
      - 'v*.*.*'

env:
  GO_VERSION: '1.24'
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # Job para verificar el código antes de crear el release
  verify:
    name: Verify Code
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Install dependencies
        run: go mod download

      - name: Install gqlgen
        run: go install github.com/99designs/gqlgen@v0.17.73

      - name: Generate GraphQL code
        run: |
          echo "Generating GraphQL code..."
          gqlgen generate

      - name: Run unit tests
        run: go test -v -race ./internal/... ./pkg/...

      - name: Run security scan
        uses: securego/gosec@master
        with:
          args: '-conf .gosec.json -exclude-dir=internal/adapters/gql/generated -exclude-dir=internal/adapters/gql/model ./...'

  # Job para crear y publicar el release en GitHub
  create-release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: [verify]
    permissions:
      contents: write
      packages: write
    outputs:
      upload_url: ${{ steps.create_release.outputs.upload_url }}
      version: ${{ steps.get_version.outputs.version }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Necesario para que conventional-changelog genere bien el changelog

      - name: Extract version from tag
        id: get_version
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          echo "Version: $VERSION"
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install conventional-changelog
        run: npm install -g conventional-changelog-cli

      - name: Generate changelog
        run: conventional-changelog -p angular -i CHANGELOG.md -s -r 2

      - name: Create Release
        id: create_release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref }}
          name: Release ${{ steps.get_version.outputs.version }}
          draft: false
          prerelease: false
          body_path: CHANGELOG.md
          generate_release_notes: true
          
  # Job para compilar para múltiples plataformas
  build-binaries:
    name: Build for ${{ matrix.os }}-${{ matrix.arch }}
    runs-on: ubuntu-latest
    needs: [create-release]
    strategy:
      matrix:
        os: [linux, windows, darwin]
        arch: [amd64, arm64]
        exclude:
          # Excluimos combinaciones que no necesitamos
          - os: windows
            arch: arm64
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Install dependencies
        run: go mod download

      - name: Install gqlgen
        run: go install github.com/99designs/gqlgen@v0.17.73

      - name: Generate GraphQL code
        run: |
          echo "Generating GraphQL code..."
          gqlgen generate

      - name: Build binary
        env:
          GOOS: ${{ matrix.os }}
          GOARCH: ${{ matrix.arch }}
          VERSION: ${{ needs.create-release.outputs.version }}
        run: |
          OUTPUT_NAME=asam-backend
          if [ "${{ matrix.os }}" = "windows" ]; then
            OUTPUT_NAME=asam-backend.exe
          fi
          
          go build -v -o $OUTPUT_NAME -ldflags "-X main.Version=$VERSION" ./cmd/api
          
          ARCHIVE_NAME=asam-backend-${{ matrix.os }}-${{ matrix.arch }}
          if [ "${{ matrix.os }}" = "windows" ]; then
            zip -r ${ARCHIVE_NAME}.zip $OUTPUT_NAME
            echo "ASSET=${ARCHIVE_NAME}.zip" >> $GITHUB_ENV
          else
            tar -czvf ${ARCHIVE_NAME}.tar.gz $OUTPUT_NAME
            echo "ASSET=${ARCHIVE_NAME}.tar.gz" >> $GITHUB_ENV
          fi

      - name: Upload Release Asset
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref }}
          files: ${{ env.ASSET }}

  # Job para construir y publicar la imagen de Docker
  build-docker-image:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    needs: [create-release]
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=tag
            type=semver,pattern={{version}},value=${{ needs.create-release.outputs.version }}
            type=semver,pattern={{major}}.{{minor}},value=${{ needs.create-release.outputs.version }}
            latest
          labels: |
            org.opencontainers.image.title=ASAM Backend
            org.opencontainers.image.description=Backend API for ASAM project
            org.opencontainers.image.version=${{ needs.create-release.outputs.version }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
