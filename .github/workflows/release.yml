name: Release Pipeline

# Este workflow se activa cuando se crea un tag con el formato 'v*.*.*'
on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write  # Necesario para crear releases
  packages: write  # Necesario para publicar paquetes
  actions: read    # Necesario para leer los workflows

env:
  GO_VERSION: '1.24'
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # Verificar el código antes de crear el release
  verify:
    name: Verify Code
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Install dependencies
        run: go mod download

      - name: Install gqlgen
        run: go install github.com/99designs/gqlgen@v0.17.73

      - name: Generate GraphQL code
        run: |
          echo "Generating GraphQL code..."
          gqlgen generate

      - name: Run golangci-lint
        run: |
          # Install golangci-lint
          curl -sSfL https://raw.githubusercontent.com/golangci/golangci-lint/master/install.sh | sh -s -- -b $(go env GOPATH)/bin v2.1.6
          
          # Run with explicit flags (avoiding config file issues)
          golangci-lint run \
            --enable=errcheck,govet,ineffassign,staticcheck,unused,gosec \
            --skip-dirs=internal/adapters/gql/generated,internal/adapters/gql/model,test,scripts,vendor \
            --timeout=5m \
            ./...

      - name: Run unit tests
        run: go test -v -race ./internal/... ./pkg/...
        env:
          JWT_ACCESS_SECRET: "test-secret"
          JWT_REFRESH_SECRET: "test-secret"
          DB_HOST: "test"
          DB_PORT: "5432"
          DB_USER: "test"
          DB_PASSWORD: "test"
          DB_NAME: "test"

  # Crear release en GitHub y construir Docker
  release-and-docker:
    name: Create Release and Docker Image
    runs-on: ubuntu-latest
    needs: [verify]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract version from tag
        id: get_version
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          echo "Version: $VERSION"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          # Generar timestamp para BUILD_TIME
          echo "build_time=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> $GITHUB_OUTPUT

      # Crear Release en GitHub
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref }}
          name: Release ${{ steps.get_version.outputs.version }}
          draft: false
          prerelease: false
          generate_release_notes: true
          body: |
            ## ASAM Backend ${{ steps.get_version.outputs.version }}
            
            ### 🐳 Docker Image
            ```bash
            docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.get_version.outputs.version }}
            ```
            
            ### ☁️ Cloud Run Deployment
            This release is ready for deployment to Google Cloud Run.
            
            To deploy with migrations:
            1. Go to Actions → "Deploy to Google Cloud Run"
            2. Run workflow with "Run database migrations" checked
            
            ### 📝 What's Changed
            See the auto-generated release notes below for details.

      # Construir y publicar imagen Docker
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=tag
            type=semver,pattern={{version}},value=${{ steps.get_version.outputs.version }}
            type=semver,pattern={{major}}.{{minor}},value=${{ steps.get_version.outputs.version }}
            latest

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            VERSION=${{ steps.get_version.outputs.version }}
            COMMIT=${{ github.sha }}
            BUILD_TIME=${{ steps.get_version.outputs.build_time }}

      - name: Create deployment instructions
        run: |
          echo "## 🚀 Deployment Instructions" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Docker Image Published" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`bash" >> $GITHUB_STEP_SUMMARY
          echo "docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.get_version.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Next Steps" >> $GITHUB_STEP_SUMMARY
          echo "1. Run database migrations (if needed)" >> $GITHUB_STEP_SUMMARY
          echo "2. Deploy to Cloud Run via GitHub Actions" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Version**: ${{ steps.get_version.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "**Commit**: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
