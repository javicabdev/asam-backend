name: Deploy to Staging

# Auto-deploy to staging when pushing to main
# This allows quick testing of changes before creating a release

on:
  push:
    branches: [main]
    paths-ignore:
      - '**/*.md'
      - '.gitignore'
      - 'docs/**'
      - 'scripts/**'
      - '.github/workflows/**'
      - '!.github/workflows/deploy-staging.yml'

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  SERVICE_NAME: asam-backend-staging
  REGION: europe-west1

jobs:
  build-and-deploy:
    name: Build and Deploy to Staging
    runs-on: ubuntu-latest
    environment: staging
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}
          
      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        
      - name: Configure Docker for GCR
        run: gcloud auth configure-docker --quiet
        
      - name: Build Docker image
        run: |
          # Build with commit SHA for traceability
          COMMIT_SHA=${GITHUB_SHA::7}
          BUILD_TIME=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          
          echo "Building image with tag: latest (commit: $COMMIT_SHA)"
          
          docker build \
            --build-arg VERSION=staging-$COMMIT_SHA \
            --build-arg COMMIT=$GITHUB_SHA \
            --build-arg BUILD_TIME=$BUILD_TIME \
            -t gcr.io/${{ env.PROJECT_ID }}/asam-backend:latest \
            -t gcr.io/${{ env.PROJECT_ID }}/asam-backend:$COMMIT_SHA \
            .
            
      - name: Push Docker image
        run: |
          # Push both tags
          docker push gcr.io/${{ env.PROJECT_ID }}/asam-backend:latest
          docker push gcr.io/${{ env.PROJECT_ID }}/asam-backend:${GITHUB_SHA::7}
          
          echo "✅ Images pushed:"
          echo "  - gcr.io/${{ env.PROJECT_ID }}/asam-backend:latest"
          echo "  - gcr.io/${{ env.PROJECT_ID }}/asam-backend:${GITHUB_SHA::7}"
        
      - name: Deploy to Cloud Run Staging
        id: deploy
        run: |
          echo "Deploying to staging..."
          
          gcloud run deploy ${{ env.SERVICE_NAME }} \
            --image=gcr.io/${{ env.PROJECT_ID }}/asam-backend:latest \
            --region=${{ env.REGION }} \
            --platform=managed \
            --allow-unauthenticated \
            --set-env-vars="ENVIRONMENT=staging" \
            --set-env-vars="DEPLOYED_COMMIT=${{ github.sha }}" \
            --set-env-vars="DEPLOYED_AT=$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            --cpu=1 \
            --memory=512Mi \
            --concurrency=80 \
            --min-instances=0 \
            --max-instances=2 \
            --timeout=60s \
            --labels="managed-by=github-actions,commit=${GITHUB_SHA::7},auto-deploy=true" \
            --quiet
            
      - name: Get service URL
        id: service
        run: |
          SERVICE_URL=$(gcloud run services describe ${{ env.SERVICE_NAME }} \
            --region=${{ env.REGION }} \
            --format='value(status.url)')
          echo "url=$SERVICE_URL" >> $GITHUB_OUTPUT
          echo "Staging URL: $SERVICE_URL"
          
      - name: Verify deployment
        run: |
          echo "Testing staging service..."
          SERVICE_URL="${{ steps.service.outputs.url }}"
          
          # Wait for service to be ready
          for i in {1..10}; do
            if curl -f -s "$SERVICE_URL/health/live" > /dev/null; then
              echo "✅ Health check passed"
              break
            fi
            echo "⏳ Attempt $i/10 - waiting 5s..."
            sleep 5
          done
          
          # Get health status
          echo ""
          echo "Health status:"
          curl -s "$SERVICE_URL/health" | jq '.' || echo "Could not get health status"
          
      - name: Create deployment summary
        run: |
          echo "## 🚀 Staging Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Deployment Info" >> $GITHUB_STEP_SUMMARY
          echo "- **Service**: ${{ env.SERVICE_NAME }}" >> $GITHUB_STEP_SUMMARY
          echo "- **URL**: ${{ steps.service.outputs.url }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit**: [\`${GITHUB_SHA::7}\`](${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }})" >> $GITHUB_STEP_SUMMARY
          echo "- **Branch**: \`main\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Docker Images" >> $GITHUB_STEP_SUMMARY
          echo "- \`gcr.io/${{ env.PROJECT_ID }}/asam-backend:latest\`" >> $GITHUB_STEP_SUMMARY
          echo "- \`gcr.io/${{ env.PROJECT_ID }}/asam-backend:${GITHUB_SHA::7}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Next Steps" >> $GITHUB_STEP_SUMMARY
          echo "1. Test in staging: ${{ steps.service.outputs.url }}" >> $GITHUB_STEP_SUMMARY
          echo "2. If ready for production, create a release:" >> $GITHUB_STEP_SUMMARY
          echo "   \`\`\`" >> $GITHUB_STEP_SUMMARY
          echo "   git tag -a v1.0.0 -m 'Release v1.0.0'" >> $GITHUB_STEP_SUMMARY
          echo "   git push origin v1.0.0" >> $GITHUB_STEP_SUMMARY
          echo "   \`\`\`" >> $GITHUB_STEP_SUMMARY
          echo "3. Deploy to production via [Deploy Workflow](${{ github.server_url }}/${{ github.repository }}/actions/workflows/cloud-run-deploy.yml)" >> $GITHUB_STEP_SUMMARY

      - name: Notify deployment status
        if: always()
        run: |
          if [[ "${{ job.status }}" == "success" ]]; then
            echo "✅ Staging deployment successful"
          else
            echo "❌ Staging deployment failed"
            echo "Check logs for details"
          fi
